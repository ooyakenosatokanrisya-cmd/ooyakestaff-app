<title>介護職員トータルケア メニュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f1ea;--panel:#fffdf8;--ink:#2b2a28;--ink-soft:#6b675f;--line:#e3ddd0;--brand:#0087BB}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;max-width:680px;width:100%;margin:0 auto;padding:20px 20px 0}
  header .brand-logo{height:38px;width:auto}
  header .hgroup{flex:1;text-align:center}
  header h1{font-family:"Noto Serif JP",serif;font-size:20px;font-weight:700}
  header .sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
  header .brand-mascot{height:46px;width:auto}
  main{max-width:680px;width:100%;margin:0 auto;padding:22px 20px 8px;flex:1}
  .tile{display:flex;align-items:center;gap:14px;background:var(--panel);border:1.5px solid var(--line);border-radius:16px;padding:18px 16px;margin-bottom:14px;text-decoration:none;color:inherit;position:relative;overflow:hidden;transition:transform .12s ease,box-shadow .12s ease}
  .tile:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(43,42,40,.08)}
  .tile:active{transform:translateY(0)}
  .tile-bar{position:absolute;left:0;top:0;bottom:0;width:8px}
  .tile-main{flex:1;margin-left:6px}
  .tile-top{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
  .tile-name{font-size:19px;font-weight:700}
  .tile-tag{color:#fff;font-size:11px;font-weight:700;padding:3px 11px;border-radius:100px}
  .tile-desc{font-size:13.5px;color:var(--ink-soft)}
  .tile-note{font-size:12px;color:#c0533f;margin-top:5px;font-weight:600}
  .tile-arrow{font-size:30px;font-weight:700;line-height:1;flex:0 0 auto;padding-right:4px}
  .brand-foot{max-width:680px;width:100%;margin:8px auto 26px;padding:16px 20px 0;text-align:center;border-top:1px solid var(--line)}
  .brand-slogan{font-size:12.5px;letter-spacing:.18em;color:var(--brand);font-weight:600}
  .brand-org{font-size:10.5px;letter-spacing:.1em;color:#a8a49c;margin-top:4px}
</style>
</head>
