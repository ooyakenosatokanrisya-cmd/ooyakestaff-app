<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職員 体調チェック</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#F7F6F2;
    --card:#FFFFFF;
    --border:#E3E1D9;
    --border-strong:#C9C6BA;
    --text:#2C2C2A;
    --text-sub:#6B6A63;
    --text-mute:#9A988F;
    --teal:#0F6E56;
    --teal-bg:#E1F5EE;
    --teal-border:#5DCAA5;
    --coral:#993C1D;
    --coral-bg:#FAECE7;
    --coral-border:#F0997B;
    --accent:#0087BB;
    --accent-bg:#E4F4FB;
    --accent-border:#7FCDEC;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    line-height:1.6;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 48px;}
  .brandbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .brandbar .logo{height:46px;flex-shrink:0;}
  .brandbar .hgroup{flex:1;min-width:0;}
  .brandbar h1{font-size:17px;font-weight:600;margin:0;line-height:1.3;}
  .brandbar .date{font-size:12px;color:var(--text-mute);}
  .brandbar .mascot{height:58px;flex-shrink:0;}
  footer{max-width:560px;margin:28px auto 0;padding:14px 16px 0;text-align:center;border-top:1px solid var(--border);}
  footer .slogan{font-size:12px;letter-spacing:.2em;color:#0087BB;font-weight:600;}
  footer .org{font-size:10.5px;letter-spacing:.1em;color:var(--text-mute);margin-top:4px;}
  .tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:4px;}
  .tab{flex:1;text-align:center;padding:9px 0;border-radius:8px;font-size:14px;font-weight:500;color:var(--text-sub);cursor:pointer;border:none;background:transparent;}
  .tab.active{background:var(--text);color:#fff;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 18px 20px;margin-bottom:16px;}
  label.field-label{display:block;font-size:13px;color:var(--text-sub);margin-bottom:8px;font-weight:500;}
  input[type=text], input[type=password], select{
    width:100%;height:42px;border:1px solid var(--border-strong);border-radius:8px;
    padding:0 12px;font-size:15px;background:#fff;color:var(--text);
  }
  .field{margin-bottom:18px;}
  .scale{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  .scale button{
    height:44px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;
    font-size:15px;font-weight:600;color:var(--text-sub);cursor:pointer;
  }
  .scale button.sel-low{background:var(--coral-bg);border-color:var(--coral-border);color:var(--coral);}
  .scale button.sel-mid{background:#fff;border-color:var(--border-strong);color:var(--text);}
  .scale button.sel-high{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal);}
  .scale-caption{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--text-mute);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .toggle2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .toggle2 button{height:44px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;}
  .toggle2 button.sel-good{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal);}
  .toggle2 button.sel-bad{background:var(--coral-bg);border-color:var(--coral-border);color:var(--coral);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{height:34px;padding:0 13px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;font-size:13px;color:var(--text-sub);cursor:pointer;}
  .chip.sel-bad{background:var(--coral-bg);border-color:var(--coral-border);color:var(--coral);}
  .chip.sel-good{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal);}
  .err{font-size:12px;color:var(--coral);margin-bottom:10px;display:none;}
  .submit-btn{width:100%;height:46px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
  .submit-btn:disabled{opacity:.55;cursor:default;}
  .saved{display:none;text-align:center;font-size:13px;color:var(--teal);margin-top:10px;font-weight:500;}
  .log-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:13px;display:flex;flex-wrap:wrap;gap:4px 12px;align-items:center;margin-bottom:8px;}
  .log-row .name{font-weight:600;min-width:80px;}
  .log-row .warn{color:var(--coral);}
  .log-row .ok{color:var(--text-sub);}
  .log-row .time{margin-left:auto;color:var(--text-mute);font-size:11px;}
  .empty{font-size:13px;color:var(--text-mute);padding:20px;text-align:center;background:var(--card);border-radius:10px;border:1px solid var(--border);}
  .section-title{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px;}
  .section-title span:first-child{font-size:14px;font-weight:600;}
  .section-title span:last-child{font-size:12px;color:var(--text-mute);}
  .qr-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px;}
  .qr-box p{font-size:13px;color:var(--text-sub);margin:10px 0 0;}
  #qrcode{display:inline-block;}
  .url-box{font-size:11px;color:var(--text-mute);word-break:break-all;margin-top:8px;padding:8px;background:var(--bg);border-radius:6px;}
  .refresh-btn{width:100%;height:40px;border:1px solid var(--border-strong);border-radius:8px;background:#fff;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:14px;}
  .refresh-btn:disabled{opacity:.55;cursor:default;}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
  .summary-card .num{font-size:20px;font-weight:700;}
  .summary-card .lbl{font-size:11px;color:var(--text-mute);margin-top:2px;}
  .key-btn{width:100%;height:44px;border:none;border-radius:8px;background:var(--text);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;}
  .done{text-align:center;padding:6px 0;}
  .done-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;}
  .done-hero{position:relative;width:86px;flex-shrink:0;}
  .done-hero img{width:86px;height:auto;display:block;animation:mascotFloat 3.2s ease-in-out infinite;}
  @keyframes mascotFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @media (prefers-reduced-motion:reduce){.done-hero img{animation:none;}}
  .done-badge{position:absolute;right:-8px;bottom:-2px;width:28px;height:28px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid #fff;}
  .mascot-bubble{position:relative;background:#fff;border:1.5px solid var(--border-strong);border-radius:12px;padding:9px 13px;font-size:13px;font-weight:600;line-height:1.6;max-width:230px;text-align:left;}
  .mascot-bubble::before{content:"";position:absolute;left:-9px;top:50%;transform:translateY(-50%);border:9px solid transparent;border-left:none;border-right:9px solid var(--border-strong);}
  .mascot-bubble::after{content:"";position:absolute;left:-7px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-left:none;border-right:8px solid #fff;}
  .done h2{font-size:18px;margin:0 0 4px;}
  .done p{font-size:13px;color:var(--text-sub);margin:0;}
  .done-summary{display:flex;justify-content:center;gap:20px;margin:14px 0 4px;}
  .done-summary .s{text-align:center;}
  .done-summary .v{font-size:21px;font-weight:700;color:var(--accent);}
  .done-summary .l{font-size:11px;color:var(--text-mute);}
  .again-btn{width:100%;height:44px;border:1px solid var(--border-strong);border-radius:8px;background:#fff;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;margin-top:14px;}
  .greet{display:flex;align-items:baseline;gap:8px;margin-bottom:16px;}
  .greet .hi{font-size:15px;font-weight:700;}
  .greet .dept{font-size:12px;color:var(--text-sub);}
  .greet a{margin-left:auto;font-size:11px;color:var(--accent);text-decoration:underline;cursor:pointer;white-space:nowrap;}
</style>
</head>

<script>
// ======== 設定 ========
// GASをウェブアプリとしてデプロイし、そのURL（/exec で終わるもの）を貼ってください
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxP0Q78GL8eOTSfCnKx96TwulERuj858pO-o03COJ8eiJwhInzt7Unom8SjTvCrCAZm-g/exec';
// ======================

function pad(n){ return n.toString().padStart(2,'0'); }
function todayDisplay(){
  var d = new Date();
  var days = ['日','月','火','水','木','金','土'];
  return (d.getMonth()+1)+'月'+d.getDate()+'日('+days[d.getDay()]+')';
}
document.getElementById('date-label').textContent = todayDisplay();

// 表示前の無害化（入力文字をそのまま画面に埋め込まないための処理）
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

var tabForm = document.getElementById('tab-form');
var tabAdmin = document.getElementById('tab-admin');
var viewForm = document.getElementById('view-form');
var viewAdmin = document.getElementById('view-admin');

tabForm.addEventListener('click', function(){
  tabForm.classList.add('active'); tabAdmin.classList.remove('active');
  viewForm.style.display='block'; viewAdmin.style.display='none';
});
tabAdmin.addEventListener('click', function(){
  tabAdmin.classList.add('active'); tabForm.classList.remove('active');
  viewAdmin.style.display='block'; viewForm.style.display='none';
});

document.getElementById('current-url').textContent = window.location.href;
try{
  new QRCode(document.getElementById('qrcode'), {
    text: window.location.href,
    width: 168,
    height: 168,
    colorDark: '#2C2C2A',
    colorLight: '#ffffff'
  });
}catch(e){}

function buildTimeOptions(sel, startH, endH){
  var opts = [{v:'', t:'選択してください'}];
  var hours = [];
  var h = startH;
  while(true){
    hours.push(h % 24);
    if (h % 24 === endH) break;
    h++;
    if (hours.length > 30) break;
  }
  hours.forEach(function(hh){
    [0,30].forEach(function(mm){
      if (hh === endH && mm === 30) return;
      opts.push({v: pad(hh)+':'+pad(mm), t: pad(hh)+':'+pad(mm)});
    });
  });
  opts.push({v:'不明', t:'不明・記憶なし'});
  opts.forEach(function(o){
    var el = document.createElement('option');
    el.value = o.v; el.textContent = o.t;
    sel.appendChild(el);
  });
}
buildTimeOptions(document.getElementById('bedtime-select'), 20, 3);
buildTimeOptions(document.getElementById('waketime-select'), 4, 10);

// ======== 名前・所属の設定（端末内に保存。旧アプリと同じ保存名のため引き継がれます） ========
var DEPTS = ['新館2階','新館3階','本館2階','本館3階','本館4階','デイケア','ヘルパー','予防','居宅介護','相談'];
var mem = {};
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k]||null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
function getName(){ return lsGet('hc_name')||''; }
function getDept(){ return lsGet('hc_dept')||''; }

var profDept = document.getElementById('prof-dept');
DEPTS.forEach(function(d){
  var o=document.createElement('option'); o.value=d; o.textContent=d; profDept.appendChild(o);
});

var profileCard = document.getElementById('profile-card');

function renderProfileState(){
  if (!getName()){
    profileCard.style.display='block';
    document.getElementById('form-card').style.display='none';
    document.getElementById('prof-name').value='';
  } else {
    profileCard.style.display='none';
    document.getElementById('form-card').style.display='block';
    document.getElementById('greet-name').textContent = getName()+' さん';
    document.getElementById('greet-dept').textContent = getDept()?('（'+getDept()+'）'):'';
  }
}

document.getElementById('prof-save').addEventListener('click', function(){
  var err = document.getElementById('prof-error');
  err.style.display='none';
  var nm = document.getElementById('prof-name').value.trim();
  if (!nm){ err.textContent='お名前を入力してください。'; err.style.display='block'; return; }
  lsSet('hc_name', nm);
  lsSet('hc_dept', profDept.value);
  renderProfileState();
});

document.getElementById('prof-link').addEventListener('click', function(){
  document.getElementById('prof-name').value = getName();
  profDept.value = getDept()||DEPTS[0];
  profileCard.style.display='block';
  document.getElementById('form-card').style.display='none';
});

var state = { condition:null, mood:null, appetite:null, symptoms:[], backpain:null, focus:null };

function buildScale(containerId, key){
  var container = document.getElementById(containerId);
  for (var i=1;i<=5;i++){
    (function(i){
      var btn = document.createElement('button');
      btn.type='button'; btn.textContent=i;
      btn.addEventListener('click', function(){
        state[key]=i;
        Array.from(container.children).forEach(function(c,idx){
          c.className='';
          if (idx+1===i){
            c.className = idx<2 ? 'sel-low' : (idx===2 ? 'sel-mid' : 'sel-high');
          }
        });
      });
      container.appendChild(btn);
    })(i);
  }
}
buildScale('condition-scale','condition');
buildScale('mood-scale','mood');
buildScale('focus-scale','focus');

var appetiteBtns = document.querySelectorAll('.appetite-btn');
appetiteBtns.forEach(function(btn){
  btn.addEventListener('click', function(){
    state.appetite = btn.getAttribute('data-val');
    appetiteBtns.forEach(function(b){
      b.className = (b===btn) ? (state.appetite==='あり' ? 'sel-good' : 'sel-bad') : '';
    });
  });
});

var symptomOptions = ['咳','喉の痛み','下痢','嘔吐','発熱感','なし'];
var symptomContainer = document.getElementById('symptom-chips');
var symptomEls = {};
symptomOptions.forEach(function(label){
  var chip = document.createElement('button');
  chip.type='button'; chip.className='chip'; chip.textContent=label;
  chip.addEventListener('click', function(){
    if (label==='なし'){ state.symptoms=['なし']; }
    else{
      var idx = state.symptoms.indexOf(label);
      if (idx>-1){ state.symptoms.splice(idx,1); }
      else{
        state.symptoms = state.symptoms.filter(function(s){return s!=='なし';});
        state.symptoms.push(label);
      }
    }
    symptomOptions.forEach(function(l){
      var active = state.symptoms.indexOf(l)>-1;
      symptomEls[l].className = 'chip' + (active ? (l==='なし' ? ' sel-good' : ' sel-bad') : '');
    });
  });
  symptomEls[label]=chip;
  symptomContainer.appendChild(chip);
});

var backpainBtns = document.querySelectorAll('.backpain-btn');
var backpainDetail = document.getElementById('backpain-detail');
backpainBtns.forEach(function(btn){
  btn.addEventListener('click', function(){
    state.backpain = btn.getAttribute('data-val');
    backpainBtns.forEach(function(b){
      b.className = (b===btn) ? (state.backpain==='あり' ? 'sel-bad' : 'sel-good') : '';
    });
    backpainDetail.style.display = state.backpain==='あり' ? 'block' : 'none';
    if (state.backpain!=='あり'){ backpainDetail.value=''; }
  });
});

function showError(msg){
  var el=document.getElementById('error-msg');
  el.textContent=msg; el.style.display='block';
}
function clearError(){ document.getElementById('error-msg').style.display='none'; }

// ======== 送信（GASへ1件ずつ追記） ========
var submitBtn = document.getElementById('submit-btn');
submitBtn.addEventListener('click', function(){
  clearError();
  var name = getName();
  var bedtime = document.getElementById('bedtime-select').value;
  var waketime = document.getElementById('waketime-select').value;

  if (!name){ renderProfileState(); return; }
  if (!state.condition){ showError('今日の体調を選択してください。'); return; }
  if (!state.mood){ showError('今の気持ちを選択してください。'); return; }
  if (!state.appetite){ showError('食欲を選択してください。'); return; }
  if (!bedtime){ showError('昨夜の就寝時間を選択してください。'); return; }
  if (!waketime){ showError('今朝の起床時間を選択してください。'); return; }
  if (state.symptoms.length===0){ showError('症状の有無を選択してください。'); return; }
  if (!state.backpain){ showError('腰痛・身体の痛みの有無を選択してください。'); return; }
  if (!state.focus){ showError('集中力の自己評価を選択してください。'); return; }

  var entry = {
    name:name, dept:getDept(), condition:state.condition, mood:state.mood, appetite:state.appetite,
    bedtime:bedtime, waketime:waketime, symptoms:state.symptoms.slice(),
    backpain:state.backpain, backpainDetail:backpainDetail.value.trim(), focus:state.focus
  };

  submitBtn.disabled = true;
  submitBtn.textContent = '送信中…';

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(entry)
  })
  .then(function(res){ return res.json(); })
  .then(function(json){
    if (!json.ok){ throw new Error(json.error || '保存エラー'); }
    showDone(entry);

    state.condition=null; state.mood=null; state.appetite=null;
    state.symptoms=[]; state.backpain=null; state.focus=null;
    document.querySelectorAll('#condition-scale button, #mood-scale button, #focus-scale button').forEach(function(c){ c.className=''; });
    appetiteBtns.forEach(function(b){ b.className=''; });
    backpainBtns.forEach(function(b){ b.className=''; });
    backpainDetail.style.display='none'; backpainDetail.value='';
    symptomOptions.forEach(function(l){ symptomEls[l].className='chip'; });
    document.getElementById('bedtime-select').value='';
    document.getElementById('waketime-select').value='';
  })
  .catch(function(){
    showError('保存に失敗しました。通信環境を確認して、もう一度お試しください。');
  })
  .finally(function(){
    submitBtn.disabled = false;
    submitBtn.textContent = '記録する';
  });
});

// ======== 完了画面（キャラクターからのメッセージ） ========
function buildCheer(e){
  var hasSymptom = e.symptoms.length>0 && e.symptoms.indexOf('なし')===-1;
  if (hasSymptom || e.condition<=2){
    return 'おつかれさまです。無理は禁物です。つらいときは早めに周りへ相談してくださいね';
  }
  if (e.backpain==='あり'){
    return 'おつかれさまです。腰や身体をいたわって、持ち上げ動作は無理をしないでくださいね';
  }
  var avg = (e.condition + e.mood + e.focus) / 3;
  if (avg>=4){ return '今日も良い調子ですね。すてきな一日になりますように'; }
  if (avg>=3){ return '今日もおつかれさまです。ほどよいペースでいきましょう'; }
  return 'おつかれさまです。無理せず、ゆっくりいきましょう';
}

var formCard = document.getElementById('form-card');
var doneCard = document.getElementById('done-card');
document.getElementById('done-mascot').src = document.querySelector('.brandbar .mascot').src;

function showDone(e){
  document.getElementById('done-cheer').textContent = buildCheer(e);
  document.getElementById('done-sub').textContent = e.name + ' さん、おつかれさまです。' + todayDisplay() + ' の記録を送信しました。';
  var sum = document.getElementById('done-summary');
  sum.innerHTML='';
  [
    {v:e.condition, l:'体調'},
    {v:e.mood, l:'気持ち'},
    {v:e.focus, l:'集中力'}
  ].forEach(function(s){
    var d=document.createElement('div');
    d.className='s';
    d.innerHTML='<div class="v">'+esc(s.v)+'</div><div class="l">'+esc(s.l)+'</div>';
    sum.appendChild(d);
  });
  formCard.style.display='none';
  doneCard.style.display='block';
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('again-btn').addEventListener('click', function(){
  doneCard.style.display='none';
  renderProfileState();
});

tabForm.addEventListener('click', function(){
  doneCard.style.display='none';
  renderProfileState();
});

renderProfileState();

// ======== 管理者ビュー（閲覧キーで取得） ========
var viewKey = '';

function fetchEntries(){
  return fetch(GAS_URL + '?key=' + encodeURIComponent(viewKey))
    .then(function(res){ return res.json(); })
    .then(function(json){
      if (!json.ok){ throw new Error(json.error || '取得エラー'); }
      return json.entries || [];
    });
}

function renderSummary(entries){
  var grid = document.getElementById('summary-grid');
  grid.innerHTML='';
  var total = entries.length;
  var lowCondition = entries.filter(function(e){return Number(e.condition)<=2;}).length;
  var symptomAlert = entries.filter(function(e){return e.symptoms && e.symptoms!=='なし' && e.symptoms!=='';}).length;
  [
    {num: total, lbl:'回答数'},
    {num: lowCondition, lbl:'体調が低め'},
    {num: symptomAlert, lbl:'症状あり'}
  ].forEach(function(s){
    var card = document.createElement('div');
    card.className='summary-card';
    card.innerHTML = '<div class="num">'+esc(s.num)+'</div><div class="lbl">'+esc(s.lbl)+'</div>';
    grid.appendChild(card);
  });
}

function renderLog(entries){
  var listEl = document.getElementById('log-list');
  var emptyEl = document.getElementById('empty-log');
  var countEl = document.getElementById('count-label');
  listEl.innerHTML='';
  countEl.textContent = entries.length + '件';
  if (entries.length===0){ emptyEl.style.display='block'; return; }
  emptyEl.style.display='none';
  entries.slice().reverse().forEach(function(e){
    var row = document.createElement('div');
    row.className='log-row';
    var symptomText = (e.symptoms && e.symptoms!=='') ? e.symptoms : 'なし';
    var backpainText = e.backpain + (e.backpainDetail ? '('+e.backpainDetail+')' : '');
    row.innerHTML =
      '<span class="name">'+esc(e.name)+(e.dept?'<span style="font-weight:400;font-size:11px;color:var(--text-mute);">（'+esc(e.dept)+'）</span>':'')+'</span>'+
      '<span class="'+(Number(e.condition)<=2?'warn':'ok')+'">体調: '+esc(e.condition)+'/5</span>'+
      '<span class="'+(Number(e.mood)<=2?'warn':'ok')+'">気持ち: '+esc(e.mood)+'/5</span>'+
      '<span class="'+(e.appetite==='なし'?'warn':'ok')+'">食欲: '+esc(e.appetite)+'</span>'+
      '<span class="ok">就寝: '+esc(e.bedtime)+'</span>'+
      '<span class="ok">起床: '+esc(e.waketime)+'</span>'+
      '<span class="'+(symptomText!=='なし'?'warn':'ok')+'">症状: '+esc(symptomText)+'</span>'+
      '<span class="'+(e.backpain==='あり'?'warn':'ok')+'">腰痛等: '+esc(backpainText)+'</span>'+
      '<span class="'+(Number(e.focus)<=2?'warn':'ok')+'">集中力: '+esc(e.focus)+'/5</span>'+
      '<span class="time">'+esc(e.submittedAt)+'</span>';
    listEl.appendChild(row);
  });
}

function loadAndRender(btn){
  if (btn){ btn.disabled = true; }
  return fetchEntries()
    .then(function(entries){
      document.getElementById('key-card').style.display='none';
      document.getElementById('admin-data').style.display='block';
      renderLog(entries);
      renderSummary(entries);
    })
    .finally(function(){ if (btn){ btn.disabled = false; } });
}

document.getElementById('key-btn').addEventListener('click', function(){
  var keyErr = document.getElementById('key-error');
  keyErr.style.display='none';
  viewKey = document.getElementById('key-input').value.trim();
  if (!viewKey){
    keyErr.textContent='閲覧キーを入力してください。'; keyErr.style.display='block'; return;
  }
  var btn = this;
  loadAndRender(btn).catch(function(err){
    if (String(err.message).indexOf('unauthorized')>-1){
      keyErr.textContent='閲覧キーが違います。';
    } else {
      keyErr.textContent='読み込みに失敗しました。通信環境を確認してください。';
    }
    keyErr.style.display='block';
  });
});

document.getElementById('refresh-btn').addEventListener('click', function(){
  var btn = this;
  loadAndRender(btn).catch(function(){
    alert('読み込みに失敗しました。もう一度お試しください。');
  });
});
</script>
