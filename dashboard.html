<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>介護職員 トータルケア・ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f1ea;--panel:#fffdf8;--ink:#2b2a28;--ink-soft:#6b675f;--line:#e3ddd0;
    --accent:#3f6b5f;--accent-soft:#e8efe9;
    --green:#4a8c6a;--yellow:#d6a93a;--orange:#dd8341;--red:#c0533f;
    --green-bg:#e9f2ec;--yellow-bg:#faf2da;--orange-bg:#f9e8da;--red-bg:#f7e3de;
    --staff:#5a6e9c;--staff-soft:#e8ecf5;--plum:#8a5a76;
    --shadow:0 1px 2px rgba(43,42,40,.04),0 8px 24px rgba(43,42,40,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;
    background-image:radial-gradient(circle at 1px 1px,rgba(63,107,95,.05) 1px,transparent 0);background-size:22px 22px;}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 80px}
  h1{font-family:"Noto Serif JP",serif;font-size:22px;font-weight:700;letter-spacing:.02em}
  h1 .sub{display:block;font-family:"Noto Sans JP";font-size:11px;font-weight:500;color:var(--ink-soft);letter-spacing:.06em;margin-top:2px}
  .rolebar{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);margin:14px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .roleswitch{display:flex;background:var(--bg);border-radius:10px;padding:3px;border:1px solid var(--line)}
  .roleswitch button{font-family:inherit;font-size:13px;font-weight:600;padding:7px 16px;border:none;background:none;border-radius:8px;cursor:pointer;color:var(--ink-soft);transition:.15s}
  .roleswitch button.on[data-r="mgr"]{background:var(--accent);color:#fff}
  .roleswitch button.on[data-r="staff"]{background:var(--staff);color:#fff}
  .rolebar select{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .rolebar .who{font-size:12px;color:var(--ink-soft);margin-left:auto}
  .demo-note{font-size:11px;color:var(--ink-soft);width:100%;border-top:1px dashed var(--line);padding-top:8px}
  .demo-note b{color:var(--accent)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin:14px 0 6px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:var(--shadow)}
  .kpi .n{font-family:"Noto Serif JP",serif;font-size:24px;font-weight:700;line-height:1}
  .kpi .l{font-size:11px;color:var(--ink-soft);margin-top:5px}
  .kpi.red .n{color:var(--red)}.kpi.orange .n{color:var(--orange)}.kpi.yellow .n{color:var(--yellow)}
  .tabs{display:flex;gap:4px;margin:18px 0 12px;flex-wrap:wrap}
  .tab{font-size:13px;font-weight:500;padding:8px 15px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);cursor:pointer;transition:.15s}
  .tab:hover{border-color:var(--accent)} .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  body.staffmode .tab.active{background:var(--staff);border-color:var(--staff)} body.staffmode .tab:hover{border-color:var(--staff)}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .hint{font-size:12px;color:var(--ink-soft);max-width:660px}
  .btn{font-family:inherit;font-size:13px;font-weight:500;padding:8px 14px;border-radius:9px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;transition:.15s}
  .btn:hover{filter:brightness(1.07)}.btn.ghost{background:transparent;color:var(--accent)}
  body.staffmode .btn{background:var(--staff);border-color:var(--staff)} body.staffmode .btn.ghost{background:transparent;color:var(--staff)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .grid{display:grid;grid-template-columns:1fr;gap:11px}
  .card{background:var(--panel);border:1px solid var(--line);border-left-width:5px;border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
  .card:hover{transform:translateY(-1px)}
  .card.lv-red{border-left-color:var(--red)}.card.lv-orange{border-left-color:var(--orange)}
  .card.lv-yellow{border-left-color:var(--yellow)}.card.lv-green{border-left-color:var(--green)}
  .card-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .name{font-size:16px;font-weight:700}
  .role{font-size:11px;color:var(--ink-soft);background:var(--bg);padding:2px 8px;border-radius:6px}
  .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-left:auto}
  .badge.red{background:var(--red-bg);color:var(--red)}.badge.orange{background:var(--orange-bg);color:var(--orange)}
  .badge.yellow{background:var(--yellow-bg);color:#9c7916}.badge.green{background:var(--green-bg);color:var(--green)}
  .badge.plan{background:#efe4ec;color:var(--plum)}
  .flags{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
  .flag{font-size:11px;padding:3px 9px;border-radius:7px;background:var(--bg);border:1px solid var(--line);color:var(--ink-soft)}
  .flag.s{color:var(--orange);border-color:#eccfb8}.flag.o{color:var(--accent);border-color:#cfe0d6}.flag.p{color:var(--red);border-color:#eccac2}
  .mini-axes{margin-top:10px;display:flex;gap:18px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft)}
  .mini-axes .ax b{color:var(--ink);font-weight:700}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .panel h2{font-family:"Noto Serif JP",serif;font-size:17px;margin-bottom:4px}
  .panel .lead{font-size:12px;color:var(--ink-soft);margin-bottom:14px}
  .check-scale{margin:12px 0}.check-scale>label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
  .scale{display:flex;gap:6px}
  .scale button{flex:1;font-family:inherit;font-size:13px;padding:11px 0;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;color:var(--ink-soft);transition:.12s}
  .scale button:hover{border-color:var(--staff)} .scale button.on{background:var(--staff);color:#fff;border-color:var(--staff);transform:scale(1.04)}
  .scale .ends{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-soft);margin-top:4px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{font-family:inherit;font-size:12px;padding:8px 13px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;color:var(--ink-soft)}
  .seg button.on{background:var(--staff);color:#fff;border-color:var(--staff)}
  .selfmsg{border-radius:12px;padding:14px 16px;font-size:13px;margin-bottom:14px}
  .selfmsg.calm{background:var(--green-bg);color:#2f6347}.selfmsg.care{background:var(--yellow-bg);color:#80651a}.selfmsg.rest{background:var(--orange-bg);color:#9a5320}
  .selfmsg b{display:block;font-size:14px;margin-bottom:3px}
  .log-list{margin-top:6px}
  .log-row{display:flex;align-items:center;gap:10px;font-size:12px;padding:8px 0;border-bottom:1px solid var(--line);color:var(--ink-soft)}
  .log-row .d{font-weight:600;color:var(--ink);min-width:96px}
  .log-row .v{display:flex;gap:10px;flex-wrap:wrap}
  .spark{margin:8px 0}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;transition:.25s;z-index:80;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .readonly-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px}
  .ro{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .ro .l{font-size:11px;color:var(--ink-soft)} .ro .v{font-size:15px;font-weight:700;margin-top:2px}
  /* anchor bars */
  .anchor-row{display:flex;align-items:center;gap:8px;font-size:12px;margin:5px 0}
  .anchor-row .nm{min-width:108px;color:var(--ink-soft)} .anchor-row.top .nm{color:var(--accent);font-weight:700}
  .abar{flex:1;height:9px;background:var(--bg);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .abar>i{display:block;height:100%;background:var(--accent)} .anchor-row.top .abar>i{background:var(--plum)}
  .anchor-row .val{min-width:26px;text-align:right;font-weight:700}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(43,42,40,.45);display:none;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto;z-index:50}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border-radius:16px;max-width:700px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;margin:auto}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .modal-head .x{margin-left:auto;font-size:22px;color:var(--ink-soft);background:none;border:none;cursor:pointer;line-height:1}
  .modal-body{padding:6px 20px 20px;max-height:74vh;overflow-y:auto}
  .sec{margin-top:16px}
  .sec h3{font-size:13px;font-weight:700;color:var(--accent);padding-bottom:6px;margin-bottom:10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .sec h3 .tag{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
  .tag.mgr{background:var(--accent-soft);color:var(--accent)} .tag.self{background:var(--staff-soft);color:var(--staff)} .tag.plum{background:#efe4ec;color:var(--plum)}
  .fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-size:11px;color:var(--ink-soft);font-weight:500}
  .field input,.field select,.field textarea{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .field.full{grid-column:1/-1}
  .num5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .num8{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
  .masked{background:var(--bg);border:1px dashed var(--line);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--ink-soft)}
  .masked b{color:var(--accent)}
  .hintbox{background:#f3ece1;border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:12px;margin-bottom:10px}
  .hintbox .t{font-weight:700;color:var(--plum);margin-bottom:5px}
  .hintbox ul{padding-left:17px;margin:0} .hintbox li{margin-bottom:3px}
  .modal-foot{padding:13px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;align-items:center}
  .alert-box{border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:4px}
  .alert-box .t{font-weight:700;margin-bottom:3px}
  .alert-box.red{background:var(--red-bg);color:#8e3326}.alert-box.orange{background:var(--orange-bg);color:#9a5320}.alert-box.yellow{background:var(--yellow-bg);color:#80651a}.alert-box.green{background:var(--green-bg);color:#2f6347}
  .del{color:var(--red);background:none;border:none;font-size:12px;cursor:pointer;margin-right:auto}
  .empty{text-align:center;color:var(--ink-soft);padding:50px 20px;font-size:14px}
  .note-row{display:flex;gap:8px;align-items:flex-start;font-size:12px;padding:8px 0;border-bottom:1px solid var(--line)}
  .note-row .nd{color:var(--ink-soft);min-width:84px}
  .proposal{background:var(--accent-soft);border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-size:13px}
  .proposal h3{font-family:"Noto Serif JP",serif;font-size:16px;margin-bottom:10px;color:var(--accent)}
  .proposal ul{padding-left:18px}.proposal li{margin-bottom:7px}.proposal li b{color:var(--accent)}
  .egogram{margin:6px 0}
  footer{margin-top:28px;font-size:11px;color:var(--ink-soft);text-align:center}
.brandbar{display:flex;align-items:center;gap:14px}.brandbar .brand-logo{height:42px;width:auto}.brandbar .brand-mascot{height:48px;width:auto;margin-left:auto}.brand-foot{max-width:1080px;margin:8px auto 26px;padding:16px 14px 0;text-align:center;border-top:1px solid #e3ddd0}.brand-slogan{font-size:12.5px;letter-spacing:.22em;color:#0087BB;font-weight:600}.brand-org{font-size:10.5px;letter-spacing:.12em;color:#a8a49c;margin-top:4px}
.ego-dept{margin-top:22px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}.ego-dept h3{font-size:13px;color:var(--ink-soft);font-weight:600;margin-bottom:10px}.ego-dept table{width:100%;border-collapse:collapse;font-size:13px}.ego-dept th,.ego-dept td{padding:7px 8px;text-align:right;border-bottom:1px solid var(--line)}.ego-dept th:first-child,.ego-dept td:first-child{text-align:left}.ego-dept thead th{color:var(--ink-soft);font-weight:600}.ego-dept .note{font-size:11px;color:var(--ink-soft);margin-top:8px}
.pl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;overflow-x:auto}.pl-wrap h3{font-size:13px;color:var(--ink-soft);font-weight:600;margin-bottom:10px}.pl-wrap table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:760px}.pl-wrap th,.pl-wrap td{padding:8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}.pl-wrap thead th{color:var(--ink-soft);font-weight:600;white-space:nowrap}.pl-chip{display:inline-block;color:#fff;font-size:10.5px;font-weight:700;border-radius:100px;padding:2px 9px;white-space:nowrap}.pl-lv{display:inline-block;font-size:10.5px;font-weight:700;border-radius:100px;padding:2px 9px;white-space:nowrap}.pl-lv.red{background:#fbeae7;color:#c0533f}.pl-lv.orange{background:#fdf1e2;color:#c07a2e}.pl-lv.yellow{background:#faf5dc;color:#a08a1e}.pl-lv.green{background:#e7f2ea;color:#3e7d5c}.pl-note{font-size:11px;color:var(--ink-soft);margin-top:10px;line-height:1.7}.pl-eye{font-size:11.5px;line-height:1.6}
.os-form{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}.os-form h3{font-size:13px;color:var(--ink-soft);font-weight:600;margin-bottom:10px}.os-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:10px}.os-grid label{font-size:11px;color:var(--ink-soft);display:block;margin-bottom:3px}.os-grid input{width:100%;font-family:inherit;font-size:13px;padding:8px 9px;border:1px solid var(--line);border-radius:8px}.os-cats{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0 10px}.os-cats td{padding:4px}.os-cats input{width:100%;font-family:inherit;font-size:12.5px;padding:7px 8px;border:1px solid var(--line);border-radius:8px}.os-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}.os-card h3{font-size:14px;font-weight:700;margin-bottom:4px}.os-meta{font-size:11.5px;color:var(--ink-soft);margin-bottom:8px}.os-tbl{width:100%;border-collapse:collapse;font-size:12.5px}.os-tbl th,.os-tbl td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}.os-tbl th:first-child,.os-tbl td:first-child{text-align:left;white-space:normal}.os-tbl thead th{color:var(--ink-soft);font-weight:600}.os-pos{color:#3e7d5c;font-weight:700}.os-neg{color:#c0533f;font-weight:700}.os-flat{color:#8b867c}.os-note{font-size:11px;color:var(--ink-soft);margin-top:8px;line-height:1.7}
</style>
</head>

<script>
let staff=[], role='mgr', view='dashboard', editId=null;

const ANCHORS=[['tf','専門・職能別'],['gm','全般管理'],['au','自律・独立'],['se','保障・安定'],['ec','起業家的創造性'],['sv','奉仕・社会貢献'],['ch','純粋な挑戦'],['ls','生活様式']];
const EGO=[['cp','CP 批判的な親'],['np','NP 養育的な親'],['a','A 大人'],['fc','FC 自由な子ども'],['ac','AC 順応した子ども']];

const blank=()=>({
  id:'s'+Date.now()+Math.floor(Math.random()*999),
  name:'',role:'介護職員',hireDate:'',
  career:{trainings:'', assessments:[]},   // assessments: 半年に1回 {date,year,anchor:{...8},ego:{...5}}
  healthLog:[], checkups:[], loadMemo:'', // healthLog: {ts,cond,mood,sleep,back,wrist,note}
  work:{consecWork:0,consecOff:0,night:0,nightBase:4,overtime:0,paidLeaveMonths:0,absence:0},
  incident:{now:0,base:1},
  mgrNotes:[],
  plan:{assessment:'',needs:'',goalShort:'',goalLong:'',actions:'',owner:'',reviewDate:'',agreedDate:'',updated:'',
    aptTasks:'',skillTags:'',avoidEnv:''}   // 面談で確認：適性業務／得意スキル・役割タグ／苦手環境特性
});
const latest=s=>s.healthLog[0]||{cond:3,mood:3,sleep:3,back:0,wrist:0,note:'',ts:''};
const lastAssess=s=>s.career.assessments[s.career.assessments.length-1]||null;

async function load(){staff=[];}
async function save(){/* 保存はクラウド（saveProfile）に一本化 */}

/* ---- alert ---- 体調・気持ち・睡眠（別アプリの体調チェックと同一項目） */
function evaluate(s){
  const S=[],O=[],P=[];const h=latest(s),w=s.work,i=s.incident;
  if(h.cond<=2)S.push('体調の低下');if(h.mood<=2)S.push('気持ちの低下');if(h.sleep<=2)S.push('睡眠の悪化');
  if(w.overtime>=45)O.push('残業45h超');else if(w.overtime>=35)O.push('残業増加');
  if(w.night>=w.nightBase+2)O.push('夜勤過多');if(w.consecWork>=6)O.push('連続勤務6日超');
  if(w.paidLeaveMonths>=3)O.push('有給未取得3ヶ月');if(w.absence>=2)O.push('欠勤・遅刻増');
  if(i.base>0&&i.now>=i.base*2)O.push('インシデント急増');if(i.now===0&&i.base>=2)O.push('報告ゼロ(抱え込み懸念)');
  if(h.back>=2)P.push('腰痛(中等度以上)');if(h.wrist>=2)P.push('手首腱鞘炎(中等度以上)');
  const severe=h.cond<=1||h.mood<=1||h.sleep<=1;const total=S.length+O.length+P.length;
  let lv;if((S.length>=1&&O.length>=1&&severe)||total>=4)lv='red';else if((S.length>=1&&O.length>=1)||O.length>=2)lv='orange';else if(total>=1)lv='yellow';else lv='green';
  const risk=Math.min(100,S.length*16+O.length*11+P.length*9+(severe?14:0));
  return{S,O,P,lv,risk,severe};
}
const LV={green:{t:'良好',cls:'green'},yellow:{t:'注意',cls:'yellow'},orange:{t:'要フォロー',cls:'orange'},red:{t:'優先対応',cls:'red'}};
const order={red:0,orange:1,yellow:2,green:3};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function topAnchor(a){if(!a)return null;let best=null,bv=-1;ANCHORS.forEach(([k,l])=>{if((a.anchor[k]||0)>bv){bv=a.anchor[k]||0;best=[k,l,bv];}});return best;}
function topEgo(a){if(!a)return null;let best=null,bv=-1;EGO.forEach(([k,l])=>{if((a.ego[k]||0)>bv){bv=a.ego[k]||0;best=[k,l,bv];}});return best;}

/* ---- support plan hints ---- */
function planHints(s){
  const e=evaluate(s),h=[];
  if(e.O.some(f=>/残業|夜勤|連続勤務/.test(f)))h.push('勤務負荷が高め：シフト・夜勤回数・連続勤務の調整を検討');
  if(e.O.includes('有給未取得3ヶ月'))h.push('休息不足：計画的な有給・連休取得の後押しを');
  if(e.P.length)h.push('身体負荷あり：介助方法の見直し・福祉用具・通院配慮を検討');
  if(e.S.length)h.push('心身のサイン：傾聴の面談と相談窓口の案内を（詳細は本人と対話で）');
  if(e.O.some(f=>/インシデント|報告ゼロ/.test(f)))h.push('業務遂行面の変化：振り返りとサポート体制の確認を');
  const ta=topAnchor(lastAssess(s));
  const amap={tf:'専門研修・得意分野を活かす担当でやりがいを',gm:'リーダー・育成役など管理志向に沿う機会を',au:'裁量の大きい業務・自己完結できる役割を',se:'キャリアパスの明確化と安心材料の提示を',ec:'新しい取り組み・改善提案の場を',sv:'理念に沿う・人の役に立つ実感のある担当を',ch:'難度の高い課題・成長実感のある目標を',ls:'勤務時間・働き方の柔軟性に配慮を'};
  if(ta&&ta[2]>0)h.push(`キャリアアンカー「${ta[1]}」が高め：${amap[ta[0]]}`);
  const te=topEgo(lastAssess(s));

  if(te&&te[2]>0)h.push(`エゴグラムは「${te[1]}」が高め：${emap[te[0]]}（あくまで傾向）`);
  if(s.plan&&s.plan.aptTasks)h.push(`適性業務「${s.plan.aptTasks.slice(0,30)}」：役割配分の軸に。負荷の高い業務との入替を検討`);

  try{const ds=deptStateFor(s.role);
    if(ds&&(ds.state.t==='要フォロー'||ds.state.t==='注意'))h.push(`配属部署「${ds.s}」は組織診断で${ds.state.t}水準：個人要因と環境要因を分けて検討（配置検討タブの部署表を参照）`);}catch(e){}
  return h;
}

function mergeOrgSeed(list){
  const merged=list.slice();
  [ORG_SEED].concat(ORG_SEED_PAST).forEach(sd=>{
    if(!merged.some(o=>o.date===sd.date))merged.push(sd);
  });
  merged.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  return merged;
}
async function loadOrgSurveys(token){
  const url=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/orgSurveys?key=${FB_API}&pageSize=100`;
  const res=await fetch(url,{headers:{'Authorization':'Bearer '+token}});
  if(!res.ok){orgSurveys=mergeOrgSeed([]);return;}
  const docs=(await res.json()).documents||[];
  const list=docs.map(d=>{const f=d.fields||{};let cats=[];try{cats=JSON.parse((f.cats&&f.cats.stringValue)||'[]');}catch(e){}
    return {id:d.name.split('/').pop(),label:(f.label&&f.label.stringValue)||'',date:(f.date&&f.date.stringValue)||'',
      respondents:+((f.respondents&&f.respondents.integerValue)||0),targets:+((f.targets&&f.targets.integerValue)||0),
      satisfaction:parseFloat((f.satisfaction&&f.satisfaction.stringValue)||'')||null,cats};});
  orgSurveys=mergeOrgSeed(list);
}
async function saveOrgSurvey(o){
  const token=await getAdminToken();
  const id=encodeURIComponent((o.date||'')+'_'+o.label.replace(/[\/\\#?]/g,'-'));
  const url=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/orgSurveys/${id}?key=${FB_API}`;
  const body={fields:{label:{stringValue:o.label},date:{stringValue:o.date},
    respondents:{integerValue:String(o.respondents||0)},targets:{integerValue:String(o.targets||0)},
    satisfaction:{stringValue:o.satisfaction==null?'':String(o.satisfaction)},cats:{stringValue:JSON.stringify(o.cats)}}};
  const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
  if(!r.ok)throw new Error('HTTP '+r.status);
}

function osDiff(v){if(v==null||isNaN(v))return '<span class="os-flat">—</span>';
  const r=Math.round(v*10)/10;
  return r>0?'<span class="os-pos">＋'+r+'</span>':r<0?'<span class="os-neg">−'+Math.abs(r)+'</span>':'<span class="os-flat">±0</span>';}

/* ---- 組織診断を「指標」として見る：水準・推移・格差・要注目層 ---- */
function osTotal(o){const c=(o.cats||[]).find(x=>String(x.n).indexOf('合計点')===0);return c?{own:c.own,pref:c.pref}:{own:null,pref:null};}
function osShortLabel(o){const m=String(o.label||'').match(/\d{4}/);return m?m[0]:String(o.label||'').slice(0,6);}
function osAsc(){return orgSurveys.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));}
function orgIndicatorHTML(){
  if(!orgSurveys.length)return '';
  const asc=osAsc(),cur=asc[asc.length-1],prev=asc[asc.length-2]||null;
  const t=osTotal(cur),tp=prev?osTotal(prev):{own:null};
  const lvDiff=(t.own!=null&&t.pref!=null)?t.own-t.pref:null;                 // ① 水準
  const chg=(t.own!=null&&tp.own!=null)?t.own-tp.own:null;                    // ② 推移（前回比）
  let streak=0,dir=0;                                                          //    連続方向
  for(let i=asc.length-1;i>0;i--){const a=osTotal(asc[i]).own,b=osTotal(asc[i-1]).own;
    if(a==null||b==null)break;const d=Math.sign(a-b);if(d===0)break;
    if(dir===0)dir=d;if(d!==dir)break;streak++;}
  const dg=(cur.groups||[]).find(g=>g.g==='所属別');                           // ③ 格差（所属別）
  let gap=null,lowD=null,hiD=null;
  if(dg){const rs=dg.rows.filter(r=>r.tot!=null);
    if(rs.length){lowD=rs.reduce((m,r)=>r.tot<m.tot?r:m);hiD=rs.reduce((m,r)=>r.tot>m.tot?r:m);gap=hiD.tot-lowD.tot;}}
  let gapPrev=null;
  if(prev){const pg=(prev.groups||[]).find(g=>g.g==='所属別');
    if(pg){const rs=pg.rows.filter(r=>r.tot!=null);if(rs.length)gapPrev=Math.max(...rs.map(r=>r.tot))-Math.min(...rs.map(r=>r.tot));}}
  const tg=(cur.groups||[]).find(g=>g.g==='勤続年数別');                        // ④ 要注目層（勤続年数別）
  let lowT=null;
  if(tg){const rs=tg.rows.filter(r=>r.tot!=null&&r.tp!=null);
    if(rs.length)lowT=rs.reduce((m,r)=>(r.tot-r.tp)<(m.tot-m.tp)?r:m);}
  const card=(title,big,sub,cls)=>'<div class="kpi '+(cls||'')+'"><div class="l" style="margin:0 0 4px;font-weight:600">'+title+'</div><div class="n" style="font-size:20px">'+big+'</div><div class="l">'+sub+'</div></div>';
  const c1=card('① 水準（府平均との差）',lvDiff!=null?osDiff(lvDiff):'—',
    t.own!=null?('合計点 '+t.own+(t.pref!=null?('（府 '+t.pref+'）'):'')+'　目標：府平均以上'):'合計点の記録なし',
    lvDiff!=null&&lvDiff<0?'orange':'');
  const c2=card('② 推移（前回比）',chg!=null?osDiff(chg):'—',
    (streak>=2?(dir<0?streak+'回連続で低下。要因の確認を':streak+'回連続で上昇'):('比較：'+(prev?osShortLabel(prev)+'→':'')+osShortLabel(cur))),
    (streak>=2&&dir<0)?'red':(chg!=null&&chg<0?'yellow':''));
  const c3=card('③ 格差（部署間の開き）',gap!=null?(gap+'点'):'—',
    lowD?('最低 '+esc(lowD.s||lowD.n)+' '+lowD.tot+'点 ／ 最高 '+esc(hiD.s||hiD.n)+' '+hiD.tot+'点'+(gapPrev!=null?('　前回の開き '+gapPrev+'点'):'')):'所属別の記録なし',
    (gapPrev!=null&&gap>gapPrev)?'yellow':'');
  const c4=card('④ 要注目層（勤続年数別）',lowT?osDiff(lowT.tot-lowT.tp):'—',
    lowT?('府平均との差が最小：'+esc(lowT.s||lowT.n)+'（'+lowT.tot+'／府 '+lowT.tp+'）'):'勤続年数別の記録なし',
    (lowT&&lowT.tot<lowT.tp)?'yellow':'');
  return '<div class="os-card"><h3>📈 指標として見る（'+esc(cur.label||'最新回')+'）</h3>'
    +'<div class="os-meta">事業計画・半期レビュー用のサマリー。①②は「職員定着」のKPI、③④は支援を入れる場所の判断材料です。</div>'
    +'<div class="kpis" style="margin:8px 0 4px">'+c1+c2+c3+c4+'</div>'
    +orgTrendSVG(asc)
    +orgMatrixHTML('所属別')+orgMatrixHTML('勤続年数別')
    +'<div class="os-note">・読み方：点数そのものより「府平均との差」と「方向（連続して上がっているか下がっているか）」で判断します。1回分の上下は誤差を含みます。<br>'
    +'・少人数の部署・属性は数名の回答で大きく振れます。③④で挙がった部署・層には、点数だけで断定せず、聞き取りと勤務データ（残業・有給・欠勤・インシデント）の確認をセットにしてください。<br>'
    +'・無記名の組織単位データのため、個人の評価・処遇の根拠には使用しません。部署点数を管理職の査定に直結させると回答が本音から離れ、指標自体が壊れます。</div></div>';
}
function orgTrendSVG(asc){
  const pts=asc.map(o=>({l:osShortLabel(o),t:osTotal(o)})).filter(p=>p.t.own!=null);
  if(pts.length<2)return '<p class="hint">合計点の記録が2回以上たまると、府平均と並べた推移グラフが表示されます。</p>';
  const w=360,h=150,padL=30,padR=10,padT=14,padB=24,n=pts.length;
  const vals=pts.flatMap(p=>[p.t.own,p.t.pref]).filter(v=>v!=null);
  const min=Math.floor(Math.min(...vals)-3),max=Math.ceil(Math.max(...vals)+3);
  const x=i=>padL+i*(w-padL-padR)/(n-1);
  const y=v=>padT+(max-v)/(max-min)*(h-padT-padB);
  const gl=[min,Math.round((min+max)/2),max].map(v=>'<line x1="'+padL+'" y1="'+y(v).toFixed(1)+'" x2="'+(w-padR)+'" y2="'+y(v).toFixed(1)+'" stroke="var(--line)" stroke-width="0.7"/><text x="'+(padL-4)+'" y="'+(y(v)+3).toFixed(1)+'" font-size="8" fill="var(--ink-soft)" text-anchor="end">'+v+'</text>').join('');
  const mk=(get,col,wd,dash)=>{const ps=pts.map((p,i)=>get(p)!=null?(x(i).toFixed(1)+','+y(get(p)).toFixed(1)):null).filter(Boolean).join(' ');
    return '<polyline points="'+ps+'" fill="none" stroke="'+col+'" stroke-width="'+wd+'"'+(dash?' stroke-dasharray="4 3"':'')+' stroke-linejoin="round"/>'
      +pts.map((p,i)=>get(p)!=null?('<circle cx="'+x(i).toFixed(1)+'" cy="'+y(get(p)).toFixed(1)+'" r="2.5" fill="'+col+'"/>'):'').join('');};
  const labs=pts.map((p,i)=>'<text x="'+x(i).toFixed(1)+'" y="'+(h-8)+'" font-size="9" fill="var(--ink-soft)" text-anchor="middle">'+esc(p.l)+'</text>').join('');
  const nums=pts.map((p,i)=>'<text x="'+x(i).toFixed(1)+'" y="'+(y(p.t.own)-6).toFixed(1)+'" font-size="8.5" font-weight="700" fill="var(--accent)" text-anchor="middle">'+p.t.own+'</text>').join('');
  const legend='<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-soft);margin-right:14px"><span style="width:16px;height:3px;background:var(--accent);display:inline-block;border-radius:2px"></span>自組織 合計点</span>'
    +'<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-soft)"><span style="width:16px;height:0;border-top:2px dashed #b3a895;display:inline-block"></span>府平均</span>';
  return '<h3 style="margin-top:8px">合計点の推移（自組織 vs 府平均）</h3>'
    +'<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" style="max-width:520px">'+gl+mk(p=>p.t.pref,'#b3a895',1.8,true)+mk(p=>p.t.own,'var(--accent)',2.5,false)+nums+labs+'</svg>'
    +'<div style="margin:2px 0 6px">'+legend+'</div>';
}
function orgMatrixHTML(gname){
  const asc=osAsc().filter(o=>(o.groups||[]).some(g=>g.g===gname&&g.rows&&g.rows.length));
  if(asc.length<2)return '';
  const keys=[],seen=new Set();
  asc.forEach(o=>{o.groups.find(g=>g.g===gname).rows.forEach(r=>{const k=r.s||r.n;if(!seen.has(k)){seen.add(k);keys.push(k);}});});
  const val=(o,k)=>{const g=o.groups.find(x=>x.g===gname);const r=g&&g.rows.find(r=>(r.s||r.n)===k);return r||null;};
  const head='<tr><th>'+(gname==='所属別'?'部署':'区分')+'</th>'+asc.map(o=>'<th>'+esc(osShortLabel(o))+'</th>').join('')+'<th>直近の前回比</th></tr>';
  const body=keys.map(k=>{
    const cells=asc.map(o=>{const r=val(o,k);if(!r||r.tot==null)return '<td>—</td>';
      const below=r.tp!=null&&r.tot<r.tp;
      return '<td'+(below?' style="color:var(--red);font-weight:700"':'')+'>'+r.tot+'</td>';}).join('');
    const a=val(asc[asc.length-1],k),b=val(asc[asc.length-2],k);
    const d=(a&&b&&a.tot!=null&&b.tot!=null)?a.tot-b.tot:null;
    return '<tr><td>'+esc(k)+'</td>'+cells+'<td>'+osDiff(d)+'</td></tr>';
  }).join('');
  return '<h3 style="margin-top:14px">'+esc(gname)+'：合計点の推移</h3>'
    +'<div style="overflow-x:auto"><table class="os-tbl"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>'
    +'<div class="os-note">赤字は、その回にその属性の府平均を下回った値です。'+(gname==='勤続年数別'?'「3年未満」が府平均を下回り続ける場合は早期離職リスクの警報として、定着施策の対象に挙げてください。':'最低部署が入れ替わっていないか、開きが縮まっているかを見ます。')+'</div>';
}

function bindOrgSurvey(){
  let extra=0;
  const add=document.getElementById('os_addrow');
  if(add)add.onclick=()=>{const tb=document.getElementById('os_rows');const i=6+extra;extra++;
    const tr=document.createElement('tr');
    tr.innerHTML='<td><input id="osc_n'+i+'" placeholder="区分名"></td><td style="width:110px"><input id="osc_o'+i+'" type="number" step="0.1"></td><td style="width:110px"><input id="osc_p'+i+'" type="number" step="0.1"></td>';
    tb.appendChild(tr);};
  const sv=document.getElementById('os_save');
  if(sv)sv.onclick=async()=>{
    const label=(document.getElementById('os_label').value||'').trim();
    const date=document.getElementById('os_date').value;
    if(!label||!date){toast('実施回のなまえと実施日を入力してください');return;}
    const cats=[];
    for(let i=0;i<6+extra+1;i++){
      const n=document.getElementById('osc_n'+i);if(!n)continue;
      const nm=(n.value||'').trim();if(!nm)continue;
      const ov=parseFloat(document.getElementById('osc_o'+i).value);
      const pv=parseFloat(document.getElementById('osc_p'+i).value);
      cats.push({n:nm,own:isNaN(ov)?null:ov,pref:isNaN(pv)?null:pv});
    }
    const o={label,date,respondents:+document.getElementById('os_resp').value||0,
      targets:+document.getElementById('os_tgt').value||0,
      satisfaction:(v=>isNaN(v)?null:v)(parseFloat(document.getElementById('os_sat').value)),cats};
    sv.disabled=true;sv.textContent='保存中…';
    try{await saveOrgSurvey(o);const t=await adminSignIn(adminCred.email,adminCred.password);await loadOrgSurveys(t);render();toast('組織診断の結果を保存しました');}
    catch(e){toast('保存に失敗：'+e.message);sv.disabled=false;sv.textContent='この回を保存';}
  };
}

/* ---- 配置検討：部署の組織状態（組織診断の所属別データから自動判定）---- */
const ORG_C7=['職場内環境','上司の機能','キャリアパスと人材育成','ワークライフバランス','職員の処遇','会社の方針','自己実現'];
function orgDeptRows(){
  const os=orgSurveys.find(o=>o.groups&&o.groups.some(g=>g.g==='所属別'));
  if(!os)return {rows:[],date:'',base:[]};
  const gr=os.groups.find(g=>g.g==='所属別');
  const base=ORG_C7.map(n=>{const c=os.cats.find(x=>x.n===n);return c?c.own:null;});
  return {rows:gr.rows,date:os.date,label:os.label,base};
}
function deptState(r){
  const td=r.tot!=null&&r.tp!=null?r.tot-r.tp:null;
  const sd=r.sat!=null&&r.sp!=null?r.sat-r.sp:null;
  if((td!=null&&td<=-15)||(sd!=null&&sd<=-0.5))return {t:'要フォロー',cls:'orange'};
  if((td!=null&&td<=-7.5)||(sd!=null&&sd<=-0.25))return {t:'注意',cls:'yellow'};
  if(td!=null&&td>=7.5)return {t:'良好',cls:'green'};
  return {t:'平均並み',cls:''};
}
function deptChip(st){
  return st.cls?'<span class="pl-lv '+st.cls+'">'+st.t+'</span>'
    :'<span class="pl-lv" style="background:#efece4;color:#6b675f">'+st.t+'</span>';
}
function deptLowHigh(r,base){
  const low=[],high=[];
  if(r.c7)r.c7.forEach((v,i)=>{
    if(v==null||base[i]==null)return;
    const d=Math.round((v-base[i])*100)/100;
    if(d<=-0.2)low.push(ORG_C7[i]);else if(d>=0.2)high.push(ORG_C7[i]);
  });
  return {low,high};
}
function deptStateFor(role){
  if(!role)return null;
  const {rows}=orgDeptRows();
  const r=rows.find(x=>x.s&&(role.indexOf(x.s)>=0||x.s.indexOf(role)>=0||x.n.indexOf(role)>=0));
  return r?{s:r.s,state:deptState(r)}:null;
}
function deptStateHTML(){
  const {rows,date,label,base}=orgDeptRows();
  if(!rows.length)return '';
  const trs=rows.map(r=>{
    const st=deptState(r);

      +'<td style="white-space:nowrap">'+(r.tot??'—')+'（'+osDiff(r.tot!=null&&r.tp!=null?r.tot-r.tp:null)+'）</td>'
      +'<td style="white-space:nowrap">'+(r.sat??'—')+'（'+osDiff(r.sat!=null&&r.sp!=null?r.sat-r.sp:null)+'）</td>'
      +'<td>'+deptChip(st)+'</td>'
      +'<td class="pl-eye">'+(lh.low.length?lh.low.join('、'):'<span style="color:var(--ink-soft)">—</span>')+'</td>'
      +'<td class="pl-eye">'+(lh.high.length?lh.high.join('、'):'<span style="color:var(--ink-soft)">—</span>')+'</td></tr>';

    +'<table><thead><tr><th>部署</th><th>合計点（府平均差）</th><th>総合満足（府平均差）</th><th>状態</th><th>低め領域（法人平均比 −0.2以下）</th><th>強み領域（同 ＋0.2以上）</th></tr></thead>'
    +'<tbody>'+trs+'</tbody></table>'
    +'<div class="pl-note">・状態は結果票の比較基準にそろえた自動判定です（要フォロー：合計点が府平均より15ポイント以上低い、または総合満足が0.5以上低い。注意：同7.5ポイント／0.25以上低い。良好：合計点が7.5ポイント以上高い）。<br>'
    +'・相談係は結果票の職種別「相談援助職」の値です。老健（区分なし）・訪問リハは対象外のため掲載していません。<br>'
    +'・低め・強み領域は中分類7項目を法人全体平均と比べた自動抽出です。無記名の組織単位データであり、個人の評価には使いません。<br>'
    +'・異動・昇進の受入判断では、要フォロー・注意の部署に新任リーダーを配置する場合、メンター設定や引継ぎ期間などの支援策をあわせて検討してください（支援策は面談のうえ決定）。</div></div>';
}
function placementCSV(){
  const head=['氏名','現部署','部署の組織状態','主要アンカー','点数','エゴグラム最高','点数','状態','研修・スキル','得意タグ','適性業務','苦手環境','着眼点'];
  const lines=[head.join(',')];
  staff.slice().sort((a,b)=>(a.role||'').localeCompare(b.role||'')||(a.name||'').localeCompare(b.name||'')).forEach(s=>{
    const e=evaluate(s),a=lastAssess(s),ta=topAnchor(a),te=topEgo(a);
    const eyes=placementEyes(s,e,ta,te).join('／');
    const ds=deptStateFor(s.role);
    const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
    lines.push([q(s.name),q(s.role||''),q(ds?ds.state.t:''),q(ta?ta[1]:'未実施'),q(ta?ta[2]:''),q(te?te[1].split(' ')[0]:''),q(te?te[2]:''),q(LV[e.lv].t),q(s.career.trainings||''),q(s.plan&&s.plan.skillTags||''),q(s.plan&&s.plan.aptTasks||''),q(s.plan&&s.plan.avoidEnv||''),q(eyes)].join(','));
  });
  const blob=new Blob(["\uFEFF"+lines.join("\n")],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='配置検討一覧_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);
  toast('配置検討一覧をCSVで保存しました');
}
/* ---- キャリアアンカー 部署別集計（平均と主要アンカー分布）---- */
function anchorDeptHTML(){
  const raw=(syncFirestore.anchorRaw||[]);
  if(!raw.length)return '';
  const latest={};
  raw.forEach(r=>{const k=r.name;if(!latest[k]||(r.date||'')>(latest[k].date||''))latest[k]=r;});
  const byDept={};
  Object.values(latest).forEach(r=>{const d=r.dept||'未設定';(byDept[d]=byDept[d]||[]).push(r);});
  const ks=ANCHORS.map(a=>a[0]);
  const heads=ANCHORS.map(a=>'<th>'+a[0].toUpperCase()+'</th>').join('');
  const depts=Object.entries(byDept).sort((a,b)=>b[1].length-a[1].length);
  const all=Object.values(latest);

  // 表1：部署別平均
  const avgRows=depts.map(([d,arr])=>{
    const avg=k=>(arr.reduce((t,r)=>t+(+r[k]||0),0)/arr.length).toFixed(1);
    return '<tr><td>'+d+'</td><td>'+arr.length+'</td>'+ks.map(k=>'<td>'+avg(k)+'</td>').join('')+'</tr>';
  }).join('');
  const avgAll=k=>(all.reduce((t,r)=>t+(+r[k]||0),0)/all.length).toFixed(1);
  const avgAllRow='<tr style="font-weight:700"><td>全体</td><td>'+all.length+'</td>'+ks.map(k=>'<td>'+avgAll(k)+'</td>').join('')+'</tr>';

  // 表2：主要アンカー（1位）の人数分布
  const topOf=r=>{let best=ks[0];ks.forEach(k=>{if((+r[k]||0)>(+r[best]||0))best=k;});return best;};
  const distRows=depts.map(([d,arr])=>{
    const cnt={};ks.forEach(k=>cnt[k]=0);arr.forEach(r=>cnt[topOf(r)]++);
    return '<tr><td>'+d+'</td><td>'+arr.length+'</td>'+ks.map(k=>'<td>'+(cnt[k]||'')+'</td>').join('')+'</tr>';
  }).join('');
  const cntAll={};ks.forEach(k=>cntAll[k]=0);all.forEach(r=>cntAll[topOf(r)]++);
  const distAllRow='<tr style="font-weight:700"><td>全体</td><td>'+all.length+'</td>'+ks.map(k=>'<td>'+(cntAll[k]||'')+'</td>').join('')+'</tr>';

  const legend=ANCHORS.map(a=>a[0].toUpperCase()+'＝'+a[1]).join('　');
  return '<div class="ego-dept"><h3>キャリアアンカー 部署別平均（各30点満点）</h3>'
    +'<table><thead><tr><th>部署</th><th>人数</th>'+heads+'</tr></thead><tbody>'+avgRows+avgAllRow+'</tbody></table>'
    +'<h3 style="margin-top:18px">主要アンカー（1位）の人数分布</h3>'
    +'<table><thead><tr><th>部署</th><th>人数</th>'+heads+'</tr></thead><tbody>'+distRows+distAllRow+'</tbody></table>'
    +'<div class="note">'+legend+'</div>'
    +'<div class="note">一人につき最新の診断1回分だけを集計。同期したデータが対象です（CSV取込分は含みません）。同点1位がある場合は、上の並び順で先のアンカーに数えます。</div></div>';
}

  const byDept={};
  Object.values(latest).forEach(r=>{const d=r.dept||'未設定';(byDept[d]=byDept[d]||[]).push(r);});
  const ks=['cp','np','a','fc','ac'];
  const rows=Object.entries(byDept).sort((a,b)=>b[1].length-a[1].length).map(([d,arr])=>{
    const avg=k=>(arr.reduce((t,r)=>t+(+r[k]||0),0)/arr.length).toFixed(1);
    return '<tr><td>'+d+'</td><td>'+arr.length+'</td>'+ks.map(k=>'<td>'+avg(k)+'</td>').join('')+'</tr>';

function renderKPI(){const ev=staff.map(evaluate);const c=l=>ev.filter(e=>e.lv===l).length;

  const os=orgSurveys[0];
  if(os){const t=os.cats.find(x=>x.n.indexOf('合計点')===0);
    if(t&&t.own!=null){const below=t.pref!=null&&t.own<t.pref;
      orgKpi=`<div class="kpi ${below?'yellow':''}"><div class="n">${t.own}</div><div class="l">組織診断 合計点${t.pref!=null?('（府'+t.pref+'）'):''}</div></div>`;}
    if(os.groups){
      const minOf=g=>{const gr=os.groups.find(x=>x.g===g);if(!gr)return null;
        return gr.rows.filter(r=>r.tot!=null).reduce((m,r)=>{
          if(!m)return r;

          if(r.tot===m.tot){const rd=r.tp!=null?r.tot-r.tp:0,md=m.tp!=null?m.tot-m.tp:0;if(rd<md)return r;}
          return m;},null);};

      if(ten)orgKpi+=`<div class="kpi ${ten.tp!=null&&ten.tot<ten.tp?'yellow':''}"><div class="n">${ten.tot}</div><div class="l">年数別最低：${esc(ten.s||ten.n)}（府${ten.tp??'—'}）</div></div>`;
    }}

    <div class="kpi red"><div class="n">${c('red')}</div><div class="l">優先対応(赤)</div></div>

/* ---- anchor/ego rendering ---- */
function anchorBars(a){if(!a)return '<p class="hint">半年ごとの測定値が未登録です。</p>';
  const max=Math.max(1,...ANCHORS.map(([k])=>a.anchor[k]||0));const ta=topAnchor(a);
  return ANCHORS.map(([k,l])=>`<div class="anchor-row ${ta&&ta[0]===k?'top':''}"><span class="nm">${l}</span><span class="abar"><i style="width:${(a.anchor[k]||0)/max*100}%"></i></span><span class="val">${a.anchor[k]||0}</span></div>`).join('');
}
function egogramSVG(a,prev){
  if(!a)return '<p class="hint">半年ごとの測定値が未登録です。</p>';
  const w=320,h=120,pad=18,n=EGO.length,max=Math.max(20,...EGO.map(([k])=>a.ego[k]||0),...(prev?EGO.map(([k])=>prev.ego[k]||0):[0]));
  const x=i=>pad+ (i*(w-2*pad)/(n-1)); const y=v=>h-26-(v/max)*(h-44);
  const line=(obj,col,wd)=>`<polyline points="${EGO.map(([k],i)=>`${x(i).toFixed(1)},${y(obj.ego[k]||0).toFixed(1)}`).join(' ')}" fill="none" stroke="${col}" stroke-width="${wd}" stroke-linejoin="round"/>`;
  const dots=(obj,col)=>EGO.map(([k],i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(obj.ego[k]||0).toFixed(1)}" r="3" fill="${col}"/>`).join('');
  const labels=EGO.map(([k,l],i)=>`<text x="${x(i).toFixed(1)}" y="${h-8}" font-size="10" fill="var(--ink-soft)" text-anchor="middle">${l.split(' ')[0]}</text>`).join('');
  return `<svg class="egogram" viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    ${prev?line(prev,'#c9c0b2',1.5):''}${prev?dots(prev,'#c9c0b2'):''}
    ${line(a,'var(--plum)',2.5)}${dots(a,'var(--plum)')}${labels}
    ${prev?'<text x="'+(w-pad)+'" y="14" font-size="9" fill="#b3a895" text-anchor="end">薄線=前回</text>':''}</svg>`;
}

/* ---- 半年測定の経過（履歴）：エゴグラム5尺度の推移＋測定履歴テーブル ---- */
const EGO_COLORS={cp:'#e05c5c',np:'#3aad6e',a:'#3a7fe0',fc:'#e09b3a',ac:'#9b5ce0'};
function egoHistorySVG(s){
  const as=s.career.assessments.filter(a=>a&&a.ego);
  if(as.length<2)return '<p class="hint">測定が2回以上たまると、エゴグラム5尺度の推移グラフが表示されます。</p>';
  const w=340,h=150,padL=24,padR=8,padT=12,padB=26,n=as.length;
  const max=Math.max(20,...as.flatMap(a=>EGO.map(([k])=>a.ego[k]||0)));
  const x=i=>padL+i*(w-padL-padR)/(n-1);
  const y=v=>padT+(1-(v||0)/max)*(h-padT-padB);
  const grid=[0,Math.round(max/2),max].map(v=>`<line x1="${padL}" y1="${y(v).toFixed(1)}" x2="${w-padR}" y2="${y(v).toFixed(1)}" stroke="var(--line)" stroke-width="0.7"/><text x="${padL-4}" y="${(y(v)+3).toFixed(1)}" font-size="8" fill="var(--ink-soft)" text-anchor="end">${v}</text>`).join('');
  const lines=EGO.map(([k])=>{
    const col=EGO_COLORS[k];
    const pts=as.map((a,i)=>`${x(i).toFixed(1)},${y(a.ego[k]||0).toFixed(1)}`).join(' ');
    const dots=as.map((a,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(a.ego[k]||0).toFixed(1)}" r="2.5" fill="${col}"/>`).join('');
    return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>${dots}`;
  }).join('');
  const xlabs=as.map((a,i)=>`<text x="${x(i).toFixed(1)}" y="${h-8}" font-size="8" fill="var(--ink-soft)" text-anchor="middle">${esc(String(a.date||a.year||'').slice(2,10))}</text>`).join('');
  const legend=EGO.map(([k,l])=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-soft);margin-right:12px"><span style="width:14px;height:3px;background:${EGO_COLORS[k]};display:inline-block;border-radius:2px"></span>${l.split(' ')[0]}</span>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="max-width:480px">${grid}${lines}${xlabs}</svg><div style="margin:4px 0 8px">${legend}</div>`;
}
function assessHistoryHTML(s){
  const as=s.career.assessments;
  if(!as.length)return '<p class="hint">半年ごとの測定がまだ記録されていません。測定を重ねると、ここに一人ひとりの推移が蓄積されます。</p>';
  const rows=as.map((a,i)=>{
    const prev=as[i-1]||null;const ta=topAnchor(a);
    const cells=EGO.map(([k])=>{
      const v=a.ego?(a.ego[k]||0):0;
      const d=(prev&&prev.ego)?v-(prev.ego[k]||0):null;
      return `<td>${v}${(d!=null&&d!==0)?`<span style="display:block;font-size:10px">${osDiff(d)}</span>`:''}</td>`;
    }).join('');
    return `<tr><td>${esc(a.date||a.year||'—')}</td><td>${(ta&&ta[2]>0)?esc(ta[1]):'—'}</td>${cells}</tr>`;
  }).reverse().join('');
  return `<div style="overflow-x:auto"><table class="os-tbl"><thead><tr><th>測定日</th><th>主要アンカー</th>${EGO.map(([,l])=>`<th>${l.split(' ')[0]}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>
    <div class="os-note">新しい測定が上。エゴグラムの数値の下は前回測定との増減です。主要アンカーは各回で最も高かった分類で、変化した場合はキャリア観の移り変わりの手がかりになります。</div>`;
}

function addAssessment(){
  const s=staff.find(x=>x.id===editId);const d=$('as_date').value||new Date().toISOString().slice(0,10);
  const anchor={},ego={};let any=false;
  ANCHORS.forEach(([k])=>{const v=parseFloat($('an_'+k).value);anchor[k]=isNaN(v)?0:v;if(v)any=true;});
  EGO.forEach(([k])=>{const v=parseFloat($('eg_'+k).value);ego[k]=isNaN(v)?0:v;if(v)any=true;});
  if(!any){toast('数値を入力してください');return;}
  s.career.assessments.push({date:d,year:d.slice(0,4),anchor,ego});save();saveProfile(s);openMgrModal(editId);toast('半年測定を記録しました');
}
function saveMgr(){
  const s=staff.find(x=>x.id===editId);if(!s)return;const n=id=>parseFloat($(id).value)||0;
  s.career.trainings=$('f_tr').value;
  s.work={consecOff:n('f_off'),consecWork:n('f_cw'),night:n('f_nt'),nightBase:n('f_ntb'),overtime:n('f_ot'),paidLeaveMonths:n('f_pl'),absence:n('f_ab')};
  s.incident={now:n('f_inow'),base:n('f_ibase')};
  const pv=id=>$(id).value;
  const before=JSON.stringify(s.plan);
  s.plan={assessment:pv('p_as'),needs:pv('p_nd'),goalShort:pv('p_gs'),goalLong:pv('p_gl'),actions:pv('p_ac'),owner:pv('p_ow'),reviewDate:pv('p_rv'),agreedDate:pv('p_ag'),
    aptTasks:pv('p_apt'),skillTags:pv('p_skill'),avoidEnv:pv('p_env'),updated:s.plan.updated};
  if(JSON.stringify({...s.plan,updated:''})!==before.replace(/"updated":"[^"]*"/,'"updated":""')){
    if(s.plan.assessment||s.plan.needs||s.plan.goalShort||s.plan.actions)s.plan.updated=new Date().toISOString().slice(0,10);
  }
  save();saveProfile(s);closeModal();render();toast('保存しました');
}

function mendanHTML(s){

    if(!c)return dim('未提出');

    let h='腰痛 '+mark(c.backpain,['はい']);
    if(c.backpain==='はい')h+='（業務支障 '+mark(c.backpainWork,['はい'])+(c.backpainDetail?'／'+esc(c.backpainDetail):'')+(c.backpainWorkDetail?'／'+esc(c.backpainWorkDetail):'')+'）';
    h+='　体調 '+mark(c.health,['悪い'])+'　疲労 '+mark(c.fatigue,['強'])+'　食欲 '+mark(c.appetite,['悪い'])
      +'　朝食 '+mark(c.breakfast,['摂取していない'])+'　体重減少 '+mark(c.weightloss,['ある'])
      +'　睡眠 '+mark(c.sleep,['眠れていない'])+'　気分 '+mark(c.mood,['暗い','落ち込んでいる']);
    if(c.measures&&c.measures.length)h+='<br>本人が希望する対策：'+esc(c.measures.join('、'))+'（最終決定は面談で）';
    return h;
  };
  const CA_NAMES={a:'A 利用者',b:'B 専門職',c:'C チーム',d:'D 育成',e:'E 風土'};
  const caTable=()=>{
    if(!m||!m.ca)return dim('未提出');
    let row1='<tr><th></th>',row2='<tr><th>今回</th>',row3='<tr><th>前回比</th>';
    ['a','b','c','d','e'].forEach(k=>{
      const v=m.ca.sub[k];const pv=mPrev&&mPrev.ca?mPrev.ca.sub[k]:null;
      const low=v<=12;
      row1+='<th>'+CA_NAMES[k]+'</th>';
      row2+='<td>'+(low?bad(v+'点'):v+'点')+'／20</td>';
      row3+='<td>'+(pv!=null?osDiff(v-pv):dim('—'))+'</td>';
    });
    return '<table class="os-tbl" style="margin-top:4px">'+row1+'<th>合計</th></tr>'
      +row2+'<td><b>'+m.ca.total+'点</b>／100</td></tr>'
      +row3+'<td>'+(mPrev&&mPrev.ca?osDiff(m.ca.total-mPrev.ca.total):dim('—'))+'</td></tr></table>'
      +'<div class="os-note">12点以下の分類は赤表示。点数より背景（本人要因か環境要因か）を対話してください。</div>';
  };
  const wishLine=w=>{
    if(!w)return dim('未提出');
    const cont=w.cont==='はい'?esc(w.cont):bad(w.cont);
    let h='志向：'+esc(w.orient)+'　継続意向：'+cont;
    if(w.learn)h+='<br>学びたい・狙いたい資格：'+esc(w.learn);
    if(w.move)h+='<br>異動・担当・夜勤の希望：'+esc(w.move);
    if(w.topic)h+='<br>相談したいこと：'+esc(w.topic);
    return h;
  };
  const w=s.work||{};
  const steps=[
    ['1. 心身の状態','評価と切り離すことを冒頭で伝える。赤字の項目を一緒に確認し、対策を決めたら下の対応記録へ。',condLine(m&&m.cond)],
    ['2. 勤務負荷の実感','数字と本人の実感のずれを見る。',
      '連続勤務 '+(w.consecWork||0)+'日／夜勤 '+(w.night||0)+'回（基準'+(w.nightBase||4)+'）／残業 '+(w.overtime||0)+'h／有給未取得 '+(w.paidLeaveMonths||0)+'ヶ月'],
    ['3. 業務適性','「苦ではない業務」「得意」「苦手な環境」を本人の言葉で聞き、下の個別支援計画の3欄に記入。',
      (s.plan&&(s.plan.aptTasks||s.plan.skillTags||s.plan.avoidEnv))?('現在の記載：'+esc([s.plan.aptTasks,s.plan.skillTags,s.plan.avoidEnv].filter(Boolean).join('／'))):dim('未記入')],
    ['4. チームのこと','「今のチームでの困りごと」「相談しやすい相手」の2問を必ず聞き、下の対応記録に種別タグ付きで追加。',''],
    ['5. Check＆Actionの振り返り','自己評価と上司の見立ての差を対話する。',caTable()],
    ['6. キャリア・本人希望','診断結果（上のキャリア欄）は入口として使い、決めつけない。',wishLine(m&&m.wish)],
    ['7. 合意','次の3ヶ月の目標・組織の支援・次回確認日を決め、下の個別支援計画に記入して合意日を入れる。ここまで到達して面談完了。','']
  ];
  const head=m?('事前入力：'+esc(m.term||'')+'　提出日 '+esc(m.date||''))
    :'この期の事前入力が未提出です。職員に面談準備ページ（mendan.html）の入力を案内してください。';
  return '<div class="sec"><h3>🗣 1on1面談（年2回・標準テンプレート）<span class="tag mgr">管理者のみ</span></h3>'
    +'<div class="hint" style="margin-bottom:8px">'+head+'</div>'
    +steps.map(x=>'<div style="border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:7px">'
      +'<div style="font-weight:700;font-size:12.5px;color:var(--plum)">'+x[0]+'</div>'
      +'<div style="font-size:11.5px;color:var(--ink-soft)">'+x[1]+'</div>'
      +(x[2]?'<div style="font-size:12.5px;margin-top:4px">'+x[2]+'</div>':'')
      +'</div>').join('')
    +'<div class="os-note">この欄は誰が面談しても同じ手順になるための台本です。内容は支援と育成のために使用し、評価・処遇の単独根拠にはしません。</div></div>';
}
/* ---- 氏名の修正（入力ミス対応）。クラウドの記録も新しい氏名へ移し、同名がいれば記録を統合 ---- */
function renameStaff(){
  const s=staff.find(x=>x.id===editId);if(!s)return;
  const nn=(prompt('正しい氏名を入力してください。\nクラウド上の記録も新しい氏名に移されます。',s.name)||'').trim();
  if(!nn||nn===s.name)return;
  const old=s.name;
  const dup=staff.find(x=>nameKey(x.name)===nameKey(nn)&&x.id!==s.id);
  if(dup){
    if(!confirm('「'+nn+'」はすでに登録されています。\nこの職員の対応記録・半年測定・研修・計画を「'+dup.name+'」側に統合し、「'+(old||'無名')+'」の登録を削除します。\n勤務・インシデントの数値は「'+dup.name+'」側の値を残します。よろしいですか？'))return;
    mergeStaffRecords(dup,s);
    staff=staff.filter(x=>x.id!==s.id);
    save();saveProfile(dup);if(old)deleteProfile(old);
    closeModal();render();toast('「'+(old||'無名')+'」の記録を「'+dup.name+'」に統合しました');
    return;
  }
  if(!confirm('氏名を「'+(old||'無名')+'」から「'+nn+'」に修正します。よろしいですか？'))return;
  s.name=nn;
  save();saveProfile(s);if(old)deleteProfile(old);
  render();openMgrModal(s.id);toast('氏名を修正しました');
}

/* ---- 管理者データの保存先（Firestore: staffProfiles）---- */
const FB_PROJECT="ooyake-staff";
const FB_API="AIzaSyDCkpzd_zGEL5DXNDP8jJPH-WPC51KhBmw";
async function getAdminToken(){if(!adminCred)throw new Error('管理者ログインが必要です');return await adminSignIn(adminCred.email,adminCred.password);}
function profileDocId(name){return encodeURIComponent(String(name).replace(/[\/\\#?]/g,'-'));}
/* 氏名照合キー：半角・全角の空白を除いて比較（「山田 花子」と「山田花子」を同一人物として扱う） */
function nameKey(n){return String(n||'').replace(/[\s\u3000]+/g,'');}
/* 記録の統合（dst に src の記録を取り込む。勤務・インシデントは dst 側を優先） */
function mergeStaffRecords(dst,src){
  dst.mgrNotes=(dst.mgrNotes||[]).concat(src.mgrNotes||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const dates=new Set((dst.career.assessments||[]).map(a=>a.date));
  (src.career.assessments||[]).forEach(a=>{if(!dates.has(a.date))dst.career.assessments.push(a);});
  dst.career.assessments.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!dst.career.trainings)dst.career.trainings=src.career.trainings||'';
  if(dst.plan&&src.plan)Object.keys(dst.plan).forEach(k=>{if(!dst.plan[k]&&src.plan[k])dst.plan[k]=src.plan[k];});
  if(!dst.role)dst.role=src.role||'';
  if(!dst.hireDate)dst.hireDate=src.hireDate||'';
}
function ensureShape(s){const b=blank();return Object.assign(b,s,{id:s.id||b.id,career:Object.assign({trainings:'',assessments:[]},s.career||{}),work:Object.assign({},b.work,s.work||{}),incident:Object.assign({},b.incident,s.incident||{}),plan:Object.assign({},b.plan,s.plan||{}),mgrNotes:Array.isArray(s.mgrNotes)?s.mgrNotes:[],healthLog:[]});}
async function saveProfile(s){
  if(!adminCred||!s||!s.name)return;
  try{
    const token=await getAdminToken();
    const copy=Object.assign({},s,{healthLog:[],mendan:[]});   // 体調ログ・面談前入力は同期で再取得するため保存しない
    const url=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/staffProfiles/${profileDocId(s.name)}?key=${FB_API}`;
    const body={fields:{name:{stringValue:s.name},data:{stringValue:JSON.stringify(copy)},updated:{stringValue:new Date().toISOString()}}};
    const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
    if(!r.ok)throw new Error('HTTP '+r.status);
  }catch(e){toast('クラウド保存に失敗：'+e.message);}
}
async function deleteProfile(name){
  if(!adminCred||!name)return;
  try{
    const token=await getAdminToken();
    const url=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/staffProfiles/${profileDocId(name)}?key=${FB_API}`;
    await fetch(url,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
  }catch(e){toast('クラウド削除に失敗：'+e.message);}
}
async function loadProfiles(token){
  const url=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/staffProfiles?key=${FB_API}&pageSize=500`;
  const res=await fetch(url,{headers:{'Authorization':'Bearer '+token}});
  if(!res.ok)throw new Error('staffProfiles HTTP '+res.status);
  const docs=(await res.json()).documents||[];
  docs.forEach(d=>{const f=d.fields||{};const raw=f.data&&f.data.stringValue;if(!raw)return;try{staff.push(ensureShape(JSON.parse(raw)));}catch(e){}});
  /* 空白ゆれによる同一人物の重複を自動統合（記録が多い方を残し、少ない方をクラウドから削除） */
  const byKey={};const removed=[];
  staff.forEach(s=>{const k=nameKey(s.name);if(!k)return;(byKey[k]=byKey[k]||[]).push(s);});
  for(const k in byKey){
    const g=byKey[k];if(g.length<2)continue;
    const score=s=>(s.mgrNotes||[]).length*2+(s.career.assessments||[]).length
      +((s.plan&&s.plan.updated)?1:0)+(/[\s\u3000]/.test(s.name||'')?0.5:0);
    g.sort((a,b)=>score(b)-score(a));
    const primary=g[0];
    for(let i=1;i<g.length;i++){
      mergeStaffRecords(primary,g[i]);
      removed.push(g[i].name);
      staff=staff.filter(x=>x.id!==g[i].id);
    }
    try{await saveProfile(primary);}catch(e){}
  }
  for(const nm of removed){
    try{
      const durl=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/staffProfiles/${profileDocId(nm)}?key=${FB_API}`;
      await fetch(durl,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
    }catch(e){}
  }
  if(removed.length)toast('氏名の空白ゆれによる重複 '+removed.length+' 件を統合しました');
}

/* ---- Firestore 同期（管理者データ＋体調・キャリア・エゴを読み込み）---- */
async function syncFirestore(){
  const FB={apiKey:FB_API,projectId:FB_PROJECT};
  const val=f=>!f?undefined:(f.stringValue!==undefined?f.stringValue:f.integerValue!==undefined?+f.integerValue:f.doubleValue!==undefined?+f.doubleValue:f.booleanValue);
  if(!adminCred)throw new Error('管理者ログインが必要です');
  const token=await adminSignIn(adminCred.email,adminCred.password);
  staff=[];                       // Firestoreを正として再構築
  await loadProfiles(token);      // まず管理者データを読み込み
  await loadOrgSurveys(token);    // 組織診断（府の調査結果）も読み込み
  const getColl=async name=>{
    const url=`https://firestore.googleapis.com/v1/projects/${FB.projectId}/databases/(default)/documents/${name}?key=${FB.apiKey}&pageSize=500`;
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+token}});
    if(!res.ok)throw new Error(name+' HTTP '+res.status+'：'+(await res.text()).slice(0,120));
    return (await res.json()).documents||[];
  };
  const findStaff=(name,dept)=>{let s=staff.find(x=>nameKey(x.name)===nameKey(name));if(!s){s=blank();s.name=name;if(dept)s.role=dept;staff.push(s);}return s;};
  const getAssessment=(s,yr,date)=>{
    let a=s.career.assessments.find(x=>x.year&&x.year===yr);
    if(!a){a={date:date||new Date().toISOString().slice(0,10),year:yr,anchor:{tf:0,gm:0,au:0,se:0,ec:0,sv:0,ch:0,ls:0},ego:{cp:0,np:0,a:0,fc:0,ac:0}};s.career.assessments.push(a);}
    if(date)a.date=date;return a;
  };
  let nH=0,nA=0,nE=0;

  // 体調 healthChecks
  (await getColl('healthChecks')).forEach(d=>{
    const f=d.fields||{};const name=val(f.name);if(!name)return;
    const s=findStaff(name,val(f.dept));
    const date=val(f.date)||'';const day=date.slice(0,10);
    const entry={ts:val(f.ts)||date,cond:+val(f.cond)||3,mood:+val(f.mood)||3,sleep:+val(f.sleep)||3,back:0,wrist:0,note:val(f.note)||'',src:'firestore'};
    const ex=day&&s.healthLog.find(l=>(l.ts||'').slice(0,10)===day);
    if(ex)Object.assign(ex,entry);else s.healthLog.unshift(entry);nH++;
  });

  // キャリアアンカー careerAnchors
  syncFirestore.anchorRaw=[];
  (await getColl('careerAnchors')).forEach(d=>{
    const f=d.fields||{};const name=val(f.name);if(!name)return;
    const s=findStaff(name,val(f.dept));
    const yr=(val(f.year)||val(f.date)||'')+'';const a=getAssessment(s,yr,val(f.date)||'');
    const rec={name,dept:val(f.dept)||'',date:val(f.date)||''};
    ['tf','gm','au','se','ec','sv','ch','ls'].forEach(k=>{const v=val(f[k]);if(v!==undefined){a.anchor[k]=+v||0;rec[k]=+v||0;}});
    syncFirestore.anchorRaw.push(rec);nA++;
  });

  // エゴグラム egograms
  syncFirestore.egoRaw=[];
  (await getColl('egograms')).forEach(d=>{
    const f=d.fields||{};const name=val(f.name);if(!name)return;
    const s=findStaff(name,val(f.dept));
    const yr=(val(f.year)||val(f.date)||'')+'';const a=getAssessment(s,yr,val(f.date)||'');
    const rec={name,dept:val(f.dept)||'',date:val(f.date)||''};
    ['cp','np','a','fc','ac'].forEach(k=>{const v=val(f[k]);if(v!==undefined){a.ego[k]=+v||0;rec[k]=+v||0;}});
    syncFirestore.egoRaw.push(rec);nE++;
  });

  // 1on1面談の事前入力 mendanPrep
  (await getColl('mendanPrep')).forEach(d=>{
    const f=d.fields||{};const name=val(f.name);if(!name)return;
    const s=findStaff(name,val(f.dept));
    if(!s.mendan)s.mendan=[];
    const p=k=>{try{return JSON.parse(val(f[k])||'null');}catch(e){return null;}};
    const rec={term:val(f.term)||'',date:val(f.date)||'',ts:val(f.ts)||'',cond:p('cond'),ca:p('ca'),wish:p('wish')};
    const ex=s.mendan.find(x=>x.term===rec.term);
    if(ex)Object.assign(ex,rec);else s.mendan.push(rec);
  });
  staff.forEach(s=>{if(s.mendan)s.mendan.sort((a,b)=>(b.date||'').localeCompare(a.date||''));});

  staff.forEach(s=>{
    s.career.assessments.sort((x,y)=>String(x.year||x.date).localeCompare(String(y.year||y.date)));
    s.healthLog.sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));
  });
  await save();
  syncFirestore._last={h:nH,a:nA,e:nE};
  return nH+nA+nE;
}

        各アプリの管理者パネルからエクスポートしたCSVを、<b>ヘッダー行ごと</b>貼り付けてください。タブ区切り・カンマ区切りのどちらも対応。<b>氏名</b>で職員を照合し、種別は自動判定します。</div>
      <div class="field full"><label>CSVを貼り付け（1行目＝ヘッダー）</label><textarea id="imp_text" rows="7" placeholder="氏名  部署  年度  診断日  1位  2位  3位  TF  GM  AU  SE  EC  SV  CH  LS  保存日時"></textarea></div>
      <label style="display:flex;gap:8px;align-items:center;font-size:13px;margin-top:10px;color:var(--ink)"><input type="checkbox" id="imp_new" checked style="width:16px;height:16px">未登録の氏名は新規職員として自動追加する</label>
      <div style="margin-top:12px"><button class="btn sm" onclick="parseImport()">解析してプレビュー</button></div>
      <div id="imp_preview" style="margin-top:14px"></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">閉じる</button><button class="btn" id="imp_apply" style="display:none" onclick="applyImport()">この内容で取り込む</button></div>`;
  $('overlay').classList.add('open');
}
function splitCSV(text){
  const lines=String(text||'').trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return null;
  const delim=lines[0].indexOf('\t')>=0?'\t':',';
  return lines.map(l=>l.split(delim).map(c=>c.replace(/^"|"$/g,'').trim()));
}
function parseImport(){
  const rows=splitCSV($('imp_text').value);const pv=$('imp_preview');
  const fail=m=>{pv.innerHTML=`<div class="alert-box orange"><div class="t">取り込めませんでした</div>${m}</div>`;$('imp_apply').style.display='none';parsedImport=null;};
  if(!rows||rows.length<2)return fail('ヘッダー行＋データ行を貼り付けてください。');
  const head=rows[0].map(h=>h.toUpperCase());const idx=n=>head.indexOf(n.toUpperCase());
  const hasHealth=idx('体調')>=0&&idx('気持ち')>=0;
  const hasAnchor=idx('TF')>=0&&idx('GM')>=0, hasEgo=idx('CP')>=0&&idx('NP')>=0;
  let kind=hasHealth?'health':(hasAnchor&&!hasEgo?'anchor':(hasEgo&&!hasAnchor?'ego':null));
  if(!kind)return fail('キャリアアンカー（TF・GM…）／エゴグラム（CP・NP…）／体調（体調・気持ち・睡眠）のいずれの列も見つかりません。ヘッダー行も含めて貼り付けているかご確認ください。');
  let ni=idx('氏名');if(ni<0)ni=0;
  const di=idx('診断日')>=0?idx('診断日'):idx('日付');const yi=idx('年度');
  const recs=[];
  if(kind==='health'){
    const mi=idx('気持ち'),si=idx('睡眠'),ti=idx('体調'),hi=idx('ひとこと');
    for(let r=1;r<rows.length;r++){const row=rows[r];if(!row[ni])continue;
      recs.push({name:row[ni],date:di>=0?row[di]:'',mood:parseFloat(row[mi])||0,sleep:parseFloat(row[si])||0,cond:parseFloat(row[ti])||0,note:hi>=0?row[hi]:''});}
  }else{
    const cols=kind==='anchor'?['TF','GM','AU','SE','EC','SV','CH','LS']:['CP','NP','A','FC','AC'];
    for(let r=1;r<rows.length;r++){const row=rows[r];if(!row[ni])continue;
      const rec={name:row[ni],year:yi>=0?row[yi]:'',date:di>=0?row[di]:'',vals:{}};
      cols.forEach(k=>{const v=parseFloat(row[idx(k)]);rec.vals[k.toLowerCase()]=isNaN(v)?0:v;});recs.push(rec);}
  }
  if(!recs.length)return fail('データ行が見つかりませんでした。');
  parsedImport={kind,recs};
  let matched=0;const newp=new Set();
  recs.forEach(rec=>{staff.find(s=>s.name===rec.name)?matched++:newp.add(rec.name);});
  const kn={anchor:'キャリアアンカー',ego:'エゴグラム',health:'体調チェック'}[kind];
  const rowHTML=kind==='health'
    ?recs.slice(0,20).map(rec=>`<div class="log-row"><span class="d">${esc(rec.name)}</span><span class="v"><span>${esc(rec.date)}</span><span>体調${rec.cond}</span><span>気持ち${rec.mood}</span><span>睡眠${rec.sleep}</span>${rec.note?`<span>📝${esc(rec.note)}</span>`:''}</span></div>`).join('')
    :recs.slice(0,20).map(rec=>`<div class="log-row"><span class="d">${esc(rec.name)}</span><span class="v"><span>${esc(rec.year)||'年度?'}</span>${rec.date?`<span>${esc(rec.date)}</span>`:''}${Object.entries(rec.vals).map(([k,v])=>`<span>${k.toUpperCase()}:${v}</span>`).join('')}</span></div>`).join('');
  pv.innerHTML=`<div class="alert-box green"><div class="t">${kn}データを ${recs.length}件 検出しました</div>
    既存職員と一致：<b>${matched}件</b>／未登録の氏名：<b>${newp.size}名</b>${newp.size?'（'+[...newp].map(esc).join('、')+'）':''}${kind==='health'?'<br><span style="font-size:11px">※ 体調・気持ち・睡眠をそのまま取り込みます。同じ氏名・同じ日付は上書き。</span>':''}</div>
    <div class="log-list">${rowHTML}${recs.length>20?'<p class="hint">ほか '+(recs.length-20)+' 件…</p>':''}</div>`;
  $('imp_apply').style.display='';
}
function applyImport(){
  if(!parsedImport){toast('先に解析してください');return;}
  const addNew=$('imp_new').checked,{kind,recs}=parsedImport;let done=0,skip=0;
  recs.forEach(rec=>{
    let s=staff.find(x=>x.name===rec.name);
    if(!s){if(!addNew){skip++;return;}s=blank();s.name=rec.name;staff.push(s);}
    if(kind==='health'){
      const day=(rec.date||'').slice(0,10);
      const entry={ts:rec.date||new Date().toISOString().slice(0,10),cond:rec.cond||3,mood:rec.mood||3,sleep:rec.sleep||3,back:0,wrist:0,note:rec.note||'',src:'import'};
      const ex=day&&s.healthLog.find(l=>(l.ts||'').slice(0,10)===day);
      if(ex)Object.assign(ex,entry);else s.healthLog.unshift(entry);
    }else{
      const yr=rec.year||rec.date||'';
      let a=s.career.assessments.find(x=>x.year&&x.year===yr);
      if(!a){a={date:rec.date||new Date().toISOString().slice(0,10),year:yr,anchor:{tf:0,gm:0,au:0,se:0,ec:0,sv:0,ch:0,ls:0},ego:{cp:0,np:0,a:0,fc:0,ac:0}};s.career.assessments.push(a);}
      if(rec.date)a.date=rec.date;
      if(kind==='anchor')Object.assign(a.anchor,rec.vals);else Object.assign(a.ego,rec.vals);
    }
    done++;});
  staff.forEach(s=>{s.career.assessments.sort((x,y)=>String(x.year||x.date).localeCompare(String(y.year||y.date)));s.healthLog.sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));});
  save();closeModal();setRole('mgr');toast(`${done}件を取り込みました${skip?'／'+skip+'件スキップ':''}`);
}

/* ---- staff self view ---- 体調・気持ち・睡眠（別アプリと同一項目） */
let draft={cond:0,mood:0,sleep:0,back:0,wrist:0};
let healthRange=30; // 経過グラフの表示期間（日）。0=全期間
function multiLine(logs){
  if(logs.length<2)return '<p class="hint">この期間の記録が2件未満です。期間を広げるか、体調チェックアプリで日々の記録を追加してください。</p>';
  const w=340,h=140,padL=22,padR=8,padB=24,padT=10,min=1,max=5,n=logs.length;
  const x=i=>padL+i*(w-padL-padR)/(n-1);
  const y=v=>padT+(max-(+v||min))/(max-min)*(h-padT-padB);
  const series=[['cond','体調','#dd8341'],['mood','気持ち','#5a6e9c'],['sleep','睡眠','#4a8c6a']];
  const grid=[1,2,3,4,5].map(v=>`<line x1="${padL}" y1="${y(v).toFixed(1)}" x2="${w-padR}" y2="${y(v).toFixed(1)}" stroke="var(--line)" stroke-width="${v===3?1:0.5}"/><text x="${padL-4}" y="${(y(v)+3).toFixed(1)}" font-size="8" fill="var(--ink-soft)" text-anchor="end">${v}</text>`).join('');
  const lines=series.map(([k,,col])=>{
    const pts=logs.map((l,i)=>`${x(i).toFixed(1)},${y(l[k]).toFixed(1)}`).join(' ');
    const dots=logs.map((l,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(l[k]).toFixed(1)}" r="2.5" fill="${col}"/>`).join('');
    return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>${dots}`;
  }).join('');
  const dlab=i=>{const t=logs[i].ts||'';return t.slice(5,10).replace('-','/');};
  const xi=[...new Set([0,Math.floor((n-1)/2),n-1])];
  const xlabs=xi.map(i=>`<text x="${x(i).toFixed(1)}" y="${h-8}" font-size="8" fill="var(--ink-soft)" text-anchor="middle">${dlab(i)}</text>`).join('');
  const legend=series.map(([,nm,col])=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-soft);margin-right:14px"><span style="width:14px;height:3px;background:${col};display:inline-block;border-radius:2px"></span>${nm}</span>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="max-width:440px">${grid}${lines}${xlabs}</svg><div style="margin-top:6px">${legend}</div>`;
}
/* ---- init ---- */
$('addBtn').onclick=addStaff;
$('importBtn').onclick=openImportModal;
$('backupBtn').onclick=()=>{
  if(!staff.length){toast('先にログインして同期してください');return;}
  const data={exportedAt:new Date().toISOString(),facility:'介護老人保健施設おおやけの里',
    staffProfiles:staff,egogramRaw:(syncFirestore.egoRaw||[]),careerAnchorRaw:(syncFirestore.anchorRaw||[])};
  const blob=new Blob([JSON.stringify(data,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='おおやけの里_バックアップ_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);
  toast('バックアップファイルを保存しました');
};
$('syncBtn').onclick=async()=>{if(!adminCred){const ok=await openLoginModal();if(!ok)return;}const b=$('syncBtn');const t=b.textContent;b.textContent='同期中…';b.disabled=true;try{await syncFirestore();render();const L=syncFirestore._last||{h:0,a:0,e:0};toast(`同期完了：体調${L.h}・キャリア${L.a}・エゴ${L.e} 件`);}catch(e){toast('同期に失敗：'+e.message);}b.textContent=t;b.disabled=false;};
$('overlay').onclick=e=>{if(e.target===$('overlay'))closeModal();};
(async()=>{await load();setRole('mgr');const ok=await openLoginModal();if(ok){try{await syncFirestore();render();}catch(e){toast('読み込みに失敗：'+e.message);}}})();
</script>
