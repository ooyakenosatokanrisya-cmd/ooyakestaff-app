<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>介護職員 トータルケア・ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f1ea;--panel:#fffdf8;--ink:#2b2a28;--ink-soft:#6b675f;--line:#e3ddd0;
    --accent:#3f6b5f;--accent-soft:#e8efe9;
    --green:#4a8c6a;--yellow:#d6a93a;--orange:#dd8341;--red:#c0533f;
    --green-bg:#e9f2ec;--yellow-bg:#faf2da;--orange-bg:#f9e8da;--red-bg:#f7e3de;
    --staff:#5a6e9c;--staff-soft:#e8ecf5;--plum:#8a5a76;
    --shadow:0 1px 2px rgba(43,42,40,.04),0 8px 24px rgba(43,42,40,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;
    background-image:radial-gradient(circle at 1px 1px,rgba(63,107,95,.05) 1px,transparent 0);background-size:22px 22px;}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 80px}
  h1{font-family:"Noto Serif JP",serif;font-size:22px;font-weight:700;letter-spacing:.02em}
  h1 .sub{display:block;font-family:"Noto Sans JP";font-size:11px;font-weight:500;color:var(--ink-soft);letter-spacing:.06em;margin-top:2px}
  .rolebar{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);margin:14px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .roleswitch{display:flex;background:var(--bg);border-radius:10px;padding:3px;border:1px solid var(--line)}
  .roleswitch button{font-family:inherit;font-size:13px;font-weight:600;padding:7px 16px;border:none;background:none;border-radius:8px;cursor:pointer;color:var(--ink-soft);transition:.15s}
  .roleswitch button.on[data-r="mgr"]{background:var(--accent);color:#fff}
  .roleswitch button.on[data-r="staff"]{background:var(--staff);color:#fff}
  .rolebar select{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .rolebar .who{font-size:12px;color:var(--ink-soft);margin-left:auto}
  .demo-note{font-size:11px;color:var(--ink-soft);width:100%;border-top:1px dashed var(--line);padding-top:8px}
  .demo-note b{color:var(--accent)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin:14px 0 6px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:var(--shadow)}
  .kpi .n{font-family:"Noto Serif JP",serif;font-size:24px;font-weight:700;line-height:1}
  .kpi .l{font-size:11px;color:var(--ink-soft);margin-top:5px}
  .kpi.red .n{color:var(--red)}.kpi.orange .n{color:var(--orange)}.kpi.yellow .n{color:var(--yellow)}
  .tabs{display:flex;gap:4px;margin:18px 0 12px;flex-wrap:wrap}
  .tab{font-size:13px;font-weight:500;padding:8px 15px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);cursor:pointer;transition:.15s}
  .tab:hover{border-color:var(--accent)} .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  body.staffmode .tab.active{background:var(--staff);border-color:var(--staff)} body.staffmode .tab:hover{border-color:var(--staff)}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .hint{font-size:12px;color:var(--ink-soft);max-width:660px}
  .btn{font-family:inherit;font-size:13px;font-weight:500;padding:8px 14px;border-radius:9px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;transition:.15s}
  .btn:hover{filter:brightness(1.07)}.btn.ghost{background:transparent;color:var(--accent)}
  body.staffmode .btn{background:var(--staff);border-color:var(--staff)} body.staffmode .btn.ghost{background:transparent;color:var(--staff)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .grid{display:grid;grid-template-columns:1fr;gap:11px}
  .card{background:var(--panel);border:1px solid var(--line);border-left-width:5px;border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
  .card:hover{transform:translateY(-1px)}
  .card.lv-red{border-left-color:var(--red)}.card.lv-orange{border-left-color:var(--orange)}
  .card.lv-yellow{border-left-color:var(--yellow)}.card.lv-green{border-left-color:var(--green)}
  .card-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .name{font-size:16px;font-weight:700}
  .role{font-size:11px;color:var(--ink-soft);background:var(--bg);padding:2px 8px;border-radius:6px}
  .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-left:auto}
  .badge.red{background:var(--red-bg);color:var(--red)}.badge.orange{background:var(--orange-bg);color:var(--orange)}
  .badge.yellow{background:var(--yellow-bg);color:#9c7916}.badge.green{background:var(--green-bg);color:var(--green)}
  .badge.plan{background:#efe4ec;color:var(--plum)}
  .flags{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
  .flag{font-size:11px;padding:3px 9px;border-radius:7px;background:var(--bg);border:1px solid var(--line);color:var(--ink-soft)}
  .flag.s{color:var(--orange);border-color:#eccfb8}.flag.o{color:var(--accent);border-color:#cfe0d6}.flag.p{color:var(--red);border-color:#eccac2}
  .mini-axes{margin-top:10px;display:flex;gap:18px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft)}
  .mini-axes .ax b{color:var(--ink);font-weight:700}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .panel h2{font-family:"Noto Serif JP",serif;font-size:17px;margin-bottom:4px}
  .panel .lead{font-size:12px;color:var(--ink-soft);margin-bottom:14px}
  .check-scale{margin:12px 0}.check-scale>label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
  .scale{display:flex;gap:6px}
  .scale button{flex:1;font-family:inherit;font-size:13px;padding:11px 0;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;color:var(--ink-soft);transition:.12s}
  .scale button:hover{border-color:var(--staff)} .scale button.on{background:var(--staff);color:#fff;border-color:var(--staff);transform:scale(1.04)}
  .scale .ends{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-soft);margin-top:4px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{font-family:inherit;font-size:12px;padding:8px 13px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;color:var(--ink-soft)}
  .seg button.on{background:var(--staff);color:#fff;border-color:var(--staff)}
  .selfmsg{border-radius:12px;padding:14px 16px;font-size:13px;margin-bottom:14px}
  .selfmsg.calm{background:var(--green-bg);color:#2f6347}.selfmsg.care{background:var(--yellow-bg);color:#80651a}.selfmsg.rest{background:var(--orange-bg);color:#9a5320}
  .selfmsg b{display:block;font-size:14px;margin-bottom:3px}
  .log-list{margin-top:6px}
  .log-row{display:flex;align-items:center;gap:10px;font-size:12px;padding:8px 0;border-bottom:1px solid var(--line);color:var(--ink-soft)}
  .log-row .d{font-weight:600;color:var(--ink);min-width:96px}
  .log-row .v{display:flex;gap:10px;flex-wrap:wrap}
  .spark{margin:8px 0}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;transition:.25s;z-index:80;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .readonly-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px}
  .ro{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .ro .l{font-size:11px;color:var(--ink-soft)} .ro .v{font-size:15px;font-weight:700;margin-top:2px}
  /* anchor bars */
  .anchor-row{display:flex;align-items:center;gap:8px;font-size:12px;margin:5px 0}
  .anchor-row .nm{min-width:108px;color:var(--ink-soft)} .anchor-row.top .nm{color:var(--accent);font-weight:700}
  .abar{flex:1;height:9px;background:var(--bg);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .abar>i{display:block;height:100%;background:var(--accent)} .anchor-row.top .abar>i{background:var(--plum)}
  .anchor-row .val{min-width:26px;text-align:right;font-weight:700}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(43,42,40,.45);display:none;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto;z-index:50}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border-radius:16px;max-width:700px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;margin:auto}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .modal-head .x{margin-left:auto;font-size:22px;color:var(--ink-soft);background:none;border:none;cursor:pointer;line-height:1}
  .modal-body{padding:6px 20px 20px;max-height:74vh;overflow-y:auto}
  .sec{margin-top:16px}
  .sec h3{font-size:13px;font-weight:700;color:var(--accent);padding-bottom:6px;margin-bottom:10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .sec h3 .tag{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
  .tag.mgr{background:var(--accent-soft);color:var(--accent)} .tag.self{background:var(--staff-soft);color:var(--staff)} .tag.plum{background:#efe4ec;color:var(--plum)}
  .fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-size:11px;color:var(--ink-soft);font-weight:500}
  .field input,.field select,.field textarea{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .field.full{grid-column:1/-1}
  .num5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .num8{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
  .masked{background:var(--bg);border:1px dashed var(--line);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--ink-soft)}
  .masked b{color:var(--accent)}
  .hintbox{background:#f3ece1;border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:12px;margin-bottom:10px}
  .hintbox .t{font-weight:700;color:var(--plum);margin-bottom:5px}
  .hintbox ul{padding-left:17px;margin:0} .hintbox li{margin-bottom:3px}
  .modal-foot{padding:13px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;align-items:center}
  .alert-box{border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:4px}
  .alert-box .t{font-weight:700;margin-bottom:3px}
  .alert-box.red{background:var(--red-bg);color:#8e3326}.alert-box.orange{background:var(--orange-bg);color:#9a5320}.alert-box.yellow{background:var(--yellow-bg);color:#80651a}.alert-box.green{background:var(--green-bg);color:#2f6347}
  .del{color:var(--red);background:none;border:none;font-size:12px;cursor:pointer;margin-right:auto}
  .empty{text-align:center;color:var(--ink-soft);padding:50px 20px;font-size:14px}
  .note-row{display:flex;gap:8px;align-items:flex-start;font-size:12px;padding:8px 0;border-bottom:1px solid var(--line)}
  .note-row .nd{color:var(--ink-soft);min-width:84px}
  .proposal{background:var(--accent-soft);border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-size:13px}
  .proposal h3{font-family:"Noto Serif JP",serif;font-size:16px;margin-bottom:10px;color:var(--accent)}
  .proposal ul{padding-left:18px}.proposal li{margin-bottom:7px}.proposal li b{color:var(--accent)}
  .egogram{margin:6px 0}
  footer{margin-top:28px;font-size:11px;color:var(--ink-soft);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>介護職員 トータルケア・ダッシュボード
    <span class="sub">キャリア ・ ヘルス ・ 休日勤務 ／ 個別支援計画で統合ケア</span></h1>

  <div class="rolebar">
    <div class="roleswitch" id="roleswitch"><button data-r="mgr" class="on">🔒 管理者</button><button data-r="staff">👤 職員</button></div>
    <select id="staffPicker" style="display:none"></select>
    <span class="who" id="whoLabel"></span>
    <div class="demo-note">⚠️ このモード切替は<b>設計デモ用</b>で本物の認証ではありません。実運用では端末分離・ログイン等の正式なアクセス制御が別途必要です。データは端末内のみに保存され、人事評価には使用しません。</div>
  </div>

  <div class="kpis" id="kpis"></div>
  <nav class="tabs" id="tabs"></nav>
  <div class="toolbar"><span class="hint" id="viewHint"></span><span style="display:flex;gap:8px"><button class="btn ghost" id="syncBtn" style="display:none">☁ 体調を同期</button><button class="btn ghost" id="importBtn" style="display:none">⬆ 診断データ取込</button><button class="btn" id="addBtn" style="display:none">＋ 職員を追加</button></span></div>
  <div id="content"></div>
  <footer>キャリア・心身・勤務を一人ひとりの個別支援計画へ。早期発見は支援のため。</footer>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const KEY='kaigo-staff-care-v3';
let staff=[], role='mgr', view='dashboard', currentStaffId=null, editId=null;

const ANCHORS=[['tf','専門・職能別'],['gm','全般管理'],['au','自律・独立'],['se','保障・安定'],['ec','起業家的創造性'],['sv','奉仕・社会貢献'],['ch','純粋な挑戦'],['ls','生活様式']];
const EGO=[['cp','CP 批判的な親'],['np','NP 養育的な親'],['a','A 大人'],['fc','FC 自由な子ども'],['ac','AC 順応した子ども']];

const blank=()=>({
  id:'s'+Date.now()+Math.floor(Math.random()*999),
  name:'',role:'介護職員',hireDate:'',
  career:{trainings:'', assessments:[]},   // assessments: 半年に1回 {date,year,anchor:{...8},ego:{...5}}
  healthLog:[], checkups:[], loadMemo:'', // healthLog: {ts,cond,mood,sleep,back,wrist,note}
  work:{consecWork:0,consecOff:0,night:0,nightBase:4,overtime:0,paidLeaveMonths:0,absence:0},
  incident:{now:0,base:1},
  mgrNotes:[],
  plan:{assessment:'',needs:'',goalShort:'',goalLong:'',actions:'',owner:'',reviewDate:'',agreedDate:'',updated:''}
});
const latest=s=>s.healthLog[0]||{cond:3,mood:3,sleep:3,back:0,wrist:0,note:'',ts:''};
const lastAssess=s=>s.career.assessments[s.career.assessments.length-1]||null;

async function load(){try{const r=await window.storage.get(KEY);if(r&&r.value){staff=JSON.parse(r.value);return;}}catch(e){}staff=[];}
async function save(){try{await window.storage.set(KEY,JSON.stringify(staff));}catch(e){console.warn(e);}}

/* ---- alert ---- 体調・気持ち・睡眠（別アプリの体調チェックと同一項目） */
function evaluate(s){
  const S=[],O=[],P=[];const h=latest(s),w=s.work,i=s.incident;
  if(h.cond<=2)S.push('体調の低下');if(h.mood<=2)S.push('気持ちの低下');if(h.sleep<=2)S.push('睡眠の悪化');
  if(w.overtime>=45)O.push('残業45h超');else if(w.overtime>=35)O.push('残業増加');
  if(w.night>=w.nightBase+2)O.push('夜勤過多');if(w.consecWork>=6)O.push('連続勤務6日超');
  if(w.paidLeaveMonths>=3)O.push('有給未取得3ヶ月');if(w.absence>=2)O.push('欠勤・遅刻増');
  if(i.base>0&&i.now>=i.base*2)O.push('インシデント急増');if(i.now===0&&i.base>=2)O.push('報告ゼロ(抱え込み懸念)');
  if(h.back>=2)P.push('腰痛(中等度以上)');if(h.wrist>=2)P.push('手首腱鞘炎(中等度以上)');
  const severe=h.cond<=1||h.mood<=1||h.sleep<=1;const total=S.length+O.length+P.length;
  let lv;if((S.length>=1&&O.length>=1&&severe)||total>=4)lv='red';else if((S.length>=1&&O.length>=1)||O.length>=2)lv='orange';else if(total>=1)lv='yellow';else lv='green';
  const risk=Math.min(100,S.length*16+O.length*11+P.length*9+(severe?14:0));
  return{S,O,P,lv,risk,severe};
}
const LV={green:{t:'良好',cls:'green'},yellow:{t:'注意',cls:'yellow'},orange:{t:'要フォロー',cls:'orange'},red:{t:'優先対応',cls:'red'}};
const order={red:0,orange:1,yellow:2,green:3};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function topAnchor(a){if(!a)return null;let best=null,bv=-1;ANCHORS.forEach(([k,l])=>{if((a.anchor[k]||0)>bv){bv=a.anchor[k]||0;best=[k,l,bv];}});return best;}
function topEgo(a){if(!a)return null;let best=null,bv=-1;EGO.forEach(([k,l])=>{if((a.ego[k]||0)>bv){bv=a.ego[k]||0;best=[k,l,bv];}});return best;}

/* ---- support plan hints ---- */
function planHints(s){
  const e=evaluate(s),h=[];
  if(e.O.some(f=>/残業|夜勤|連続勤務/.test(f)))h.push('勤務負荷が高め：シフト・夜勤回数・連続勤務の調整を検討');
  if(e.O.includes('有給未取得3ヶ月'))h.push('休息不足：計画的な有給・連休取得の後押しを');
  if(e.P.length)h.push('身体負荷あり：介助方法の見直し・福祉用具・通院配慮を検討');
  if(e.S.length)h.push('心身のサイン：傾聴の面談と相談窓口の案内を（詳細は本人と対話で）');
  if(e.O.some(f=>/インシデント|報告ゼロ/.test(f)))h.push('業務遂行面の変化：振り返りとサポート体制の確認を');
  const ta=topAnchor(lastAssess(s));
  const amap={tf:'専門研修・得意分野を活かす担当でやりがいを',gm:'リーダー・育成役など管理志向に沿う機会を',au:'裁量の大きい業務・自己完結できる役割を',se:'キャリアパスの明確化と安心材料の提示を',ec:'新しい取り組み・改善提案の場を',sv:'理念に沿う・人の役に立つ実感のある担当を',ch:'難度の高い課題・成長実感のある目標を',ls:'勤務時間・働き方の柔軟性に配慮を'};
  if(ta&&ta[2]>0)h.push(`キャリアアンカー「${ta[1]}」が高め：${amap[ta[0]]}`);
  const te=topEgo(lastAssess(s));
  const emap={cp:'責任感が強い傾向。抱え込みすぎに注意し役割分担を',np:'面倒見が良い傾向。燃え尽きに注意し自分のケアも促す',a:'冷静・論理的な傾向。データに基づく対話が有効',fc:'のびのびした強みを活かす配置・自由度を',ac:'自己主張しづらい傾向かも。安心して相談できる関係づくりを'};
  if(te&&te[2]>0)h.push(`エゴグラムは「${te[1]}」が高め：${emap[te[0]]}（あくまで傾向）`);
  return h;
}

/* ---- tabs ---- */
const MGR_TABS=[['dashboard','📊 ダッシュボード'],['career','🧭 キャリア'],['work','📅 休日・勤務'],['plan','📝 個別支援計画'],['proposal','💡 設計メモ']];
const STAFF_TABS=[['myhealth','🩺 マイヘルス（随時入力）'],['mycareer','🧭 自分のキャリア'],['mywork','📅 自分の勤務']];
function setupTabs(){

function mgrCard(s,e){
  let body='';
  if(view==='dashboard'){
    const flags=[...e.S.map(f=>`<span class="flag s">${f}</span>`),...e.O.map(f=>`<span class="flag o">${f}</span>`),...e.P.map(f=>`<span class="flag p">${f}</span>`)].join('');

    body=`<div class="flags">${flags||'<span class="flag">特記なし</span>'}</div><div class="mini-axes"><span class="ax">総合リスク <b>${e.risk}</b>/100</span><span class="ax">${upd}</span></div>`;

/* ---- anchor/ego rendering ---- */
function anchorBars(a){if(!a)return '<p class="hint">半年ごとの測定値が未登録です。</p>';
  const max=Math.max(1,...ANCHORS.map(([k])=>a.anchor[k]||0));const ta=topAnchor(a);
  return ANCHORS.map(([k,l])=>`<div class="anchor-row ${ta&&ta[0]===k?'top':''}"><span class="nm">${l}</span><span class="abar"><i style="width:${(a.anchor[k]||0)/max*100}%"></i></span><span class="val">${a.anchor[k]||0}</span></div>`).join('');
}
function egogramSVG(a,prev){
  if(!a)return '<p class="hint">半年ごとの測定値が未登録です。</p>';
  const w=320,h=120,pad=18,n=EGO.length,max=Math.max(20,...EGO.map(([k])=>a.ego[k]||0),...(prev?EGO.map(([k])=>prev.ego[k]||0):[0]));
  const x=i=>pad+ (i*(w-2*pad)/(n-1)); const y=v=>h-26-(v/max)*(h-44);
  const line=(obj,col,wd)=>`<polyline points="${EGO.map(([k],i)=>`${x(i).toFixed(1)},${y(obj.ego[k]||0).toFixed(1)}`).join(' ')}" fill="none" stroke="${col}" stroke-width="${wd}" stroke-linejoin="round"/>`;
  const dots=(obj,col)=>EGO.map(([k],i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(obj.ego[k]||0).toFixed(1)}" r="3" fill="${col}"/>`).join('');
  const labels=EGO.map(([k,l],i)=>`<text x="${x(i).toFixed(1)}" y="${h-8}" font-size="10" fill="var(--ink-soft)" text-anchor="middle">${l.split(' ')[0]}</text>`).join('');
  return `<svg class="egogram" viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    ${prev?line(prev,'#c9c0b2',1.5):''}${prev?dots(prev,'#c9c0b2'):''}
    ${line(a,'var(--plum)',2.5)}${dots(a,'var(--plum)')}${labels}
    ${prev?'<text x="'+(w-pad)+'" y="14" font-size="9" fill="#b3a895" text-anchor="end">薄線=前回</text>':''}</svg>`;
}

function addAssessment(){
  const s=staff.find(x=>x.id===editId);const d=$('as_date').value||new Date().toISOString().slice(0,10);
  const anchor={},ego={};let any=false;
  ANCHORS.forEach(([k])=>{const v=parseFloat($('an_'+k).value);anchor[k]=isNaN(v)?0:v;if(v)any=true;});
  EGO.forEach(([k])=>{const v=parseFloat($('eg_'+k).value);ego[k]=isNaN(v)?0:v;if(v)any=true;});
  if(!any){toast('数値を入力してください');return;}
  s.career.assessments.push({date:d,year:d.slice(0,4),anchor,ego});save();saveProfile(s);openMgrModal(editId);toast('半年測定を記録しました');
}
function saveMgr(){
  const s=staff.find(x=>x.id===editId);if(!s)return;const n=id=>parseFloat($(id).value)||0;
  s.career.trainings=$('f_tr').value;
  s.work={consecOff:n('f_off'),consecWork:n('f_cw'),night:n('f_nt'),nightBase:n('f_ntb'),overtime:n('f_ot'),paidLeaveMonths:n('f_pl'),absence:n('f_ab')};
  s.incident={now:n('f_inow'),base:n('f_ibase')};
  const pv=id=>$(id).value;
  const before=JSON.stringify(s.plan);
  s.plan={assessment:pv('p_as'),needs:pv('p_nd'),goalShort:pv('p_gs'),goalLong:pv('p_gl'),actions:pv('p_ac'),owner:pv('p_ow'),reviewDate:pv('p_rv'),agreedDate:pv('p_ag'),updated:s.plan.updated};
  if(JSON.stringify({...s.plan,updated:''})!==before.replace(/"updated":"[^"]*"/,'"updated":""')){
    if(s.plan.assessment||s.plan.needs||s.plan.goalShort||s.plan.actions)s.plan.updated=new Date().toISOString().slice(0,10);
  }
  save();saveProfile(s);closeModal();render();toast('保存しました');
}

/* ---- Firestore 同期（管理者データ＋体調・キャリア・エゴを読み込み）---- */
async function syncFirestore(){
  const FB={apiKey:FB_API,projectId:FB_PROJECT};
  const val=f=>!f?undefined:(f.stringValue!==undefined?f.stringValue:f.integerValue!==undefined?+f.integerValue:f.doubleValue!==undefined?+f.doubleValue:f.booleanValue);
  if(!adminCred)throw new Error('管理者ログインが必要です');
  const token=await adminSignIn(adminCred.email,adminCred.password);
  staff=[];                       // Firestoreを正として再構築
  await loadProfiles(token);      // まず管理者データを読み込み
  const getColl=async name=>{
    const url=`https://firestore.googleapis.com/v1/projects/${FB.projectId}/databases/(default)/documents/${name}?key=${FB.apiKey}&pageSize=500`;
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+token}});
    if(!res.ok)throw new Error(name+' HTTP '+res.status+'：'+(await res.text()).slice(0,120));
    return (await res.json()).documents||[];
  };
  const findStaff=(name,dept)=>{let s=staff.find(x=>x.name===name);if(!s){s=blank();s.name=name;if(dept)s.role=dept;staff.push(s);}return s;};
  const getAssessment=(s,yr,date)=>{
    let a=s.career.assessments.find(x=>x.year&&x.year===yr);
    if(!a){a={date:date||new Date().toISOString().slice(0,10),year:yr,anchor:{tf:0,gm:0,au:0,se:0,ec:0,sv:0,ch:0,ls:0},ego:{cp:0,np:0,a:0,fc:0,ac:0}};s.career.assessments.push(a);}
    if(date)a.date=date;return a;
  };
  let nH=0,nA=0,nE=0;

  // 体調 healthChecks
  (await getColl('healthChecks')).forEach(d=>{
    const f=d.fields||{};const name=val(f.name);if(!name)return;
    const s=findStaff(name,val(f.dept));
    const date=val(f.date)||'';const day=date.slice(0,10);
    const entry={ts:val(f.ts)||date,cond:+val(f.cond)||3,mood:+val(f.mood)||3,sleep:+val(f.sleep)||3,back:0,wrist:0,note:val(f.note)||'',src:'firestore'};
    const ex=day&&s.healthLog.find(l=>(l.ts||'').slice(0,10)===day);
    if(ex)Object.assign(ex,entry);else s.healthLog.unshift(entry);nH++;
  });

  // キャリアアンカー careerAnchors
  (await getColl('careerAnchors')).forEach(d=>{
    const f=d.fields||{};const name=val(f.name);if(!name)return;
    const s=findStaff(name,val(f.dept));
    const yr=(val(f.year)||val(f.date)||'')+'';const a=getAssessment(s,yr,val(f.date)||'');
    ['tf','gm','au','se','ec','sv','ch','ls'].forEach(k=>{const v=val(f[k]);if(v!==undefined)a.anchor[k]=+v||0;});nA++;
  });

  // エゴグラム egograms
  (await getColl('egograms')).forEach(d=>{
    const f=d.fields||{};const name=val(f.name);if(!name)return;
    const s=findStaff(name,val(f.dept));
    const yr=(val(f.year)||val(f.date)||'')+'';const a=getAssessment(s,yr,val(f.date)||'');
    ['cp','np','a','fc','ac'].forEach(k=>{const v=val(f[k]);if(v!==undefined)a.ego[k]=+v||0;});nE++;
  });

  staff.forEach(s=>{
    s.career.assessments.sort((x,y)=>String(x.year||x.date).localeCompare(String(y.year||y.date)));
    s.healthLog.sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));
  });
  await save();
  syncFirestore._last={h:nH,a:nA,e:nE};
  return nH+nA+nE;
}

function splitCSV(text){
  const lines=String(text||'').trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return null;
  const delim=lines[0].indexOf('\t')>=0?'\t':',';
  return lines.map(l=>l.split(delim).map(c=>c.replace(/^"|"$/g,'').trim()));
}
function parseImport(){
  const rows=splitCSV($('imp_text').value);const pv=$('imp_preview');
  const fail=m=>{pv.innerHTML=`<div class="alert-box orange"><div class="t">取り込めませんでした</div>${m}</div>`;$('imp_apply').style.display='none';parsedImport=null;};
  if(!rows||rows.length<2)return fail('ヘッダー行＋データ行を貼り付けてください。');
  const head=rows[0].map(h=>h.toUpperCase());const idx=n=>head.indexOf(n.toUpperCase());
  const hasHealth=idx('体調')>=0&&idx('気持ち')>=0;
  const hasAnchor=idx('TF')>=0&&idx('GM')>=0, hasEgo=idx('CP')>=0&&idx('NP')>=0;
  let kind=hasHealth?'health':(hasAnchor&&!hasEgo?'anchor':(hasEgo&&!hasAnchor?'ego':null));
  if(!kind)return fail('キャリアアンカー（TF・GM…）／エゴグラム（CP・NP…）／体調（体調・気持ち・睡眠）のいずれの列も見つかりません。ヘッダー行も含めて貼り付けているかご確認ください。');
  let ni=idx('氏名');if(ni<0)ni=0;
  const di=idx('診断日')>=0?idx('診断日'):idx('日付');const yi=idx('年度');
  const recs=[];
  if(kind==='health'){
    const mi=idx('気持ち'),si=idx('睡眠'),ti=idx('体調'),hi=idx('ひとこと');
    for(let r=1;r<rows.length;r++){const row=rows[r];if(!row[ni])continue;
      recs.push({name:row[ni],date:di>=0?row[di]:'',mood:parseFloat(row[mi])||0,sleep:parseFloat(row[si])||0,cond:parseFloat(row[ti])||0,note:hi>=0?row[hi]:''});}
  }else{
    const cols=kind==='anchor'?['TF','GM','AU','SE','EC','SV','CH','LS']:['CP','NP','A','FC','AC'];
    for(let r=1;r<rows.length;r++){const row=rows[r];if(!row[ni])continue;
      const rec={name:row[ni],year:yi>=0?row[yi]:'',date:di>=0?row[di]:'',vals:{}};
      cols.forEach(k=>{const v=parseFloat(row[idx(k)]);rec.vals[k.toLowerCase()]=isNaN(v)?0:v;});recs.push(rec);}
  }
  if(!recs.length)return fail('データ行が見つかりませんでした。');
  parsedImport={kind,recs};
  let matched=0;const newp=new Set();
  recs.forEach(rec=>{staff.find(s=>s.name===rec.name)?matched++:newp.add(rec.name);});
  const kn={anchor:'キャリアアンカー',ego:'エゴグラム',health:'体調チェック'}[kind];
  const rowHTML=kind==='health'
    ?recs.slice(0,20).map(rec=>`<div class="log-row"><span class="d">${esc(rec.name)}</span><span class="v"><span>${esc(rec.date)}</span><span>体調${rec.cond}</span><span>気持ち${rec.mood}</span><span>睡眠${rec.sleep}</span>${rec.note?`<span>📝${esc(rec.note)}</span>`:''}</span></div>`).join('')
    :recs.slice(0,20).map(rec=>`<div class="log-row"><span class="d">${esc(rec.name)}</span><span class="v"><span>${esc(rec.year)||'年度?'}</span>${rec.date?`<span>${esc(rec.date)}</span>`:''}${Object.entries(rec.vals).map(([k,v])=>`<span>${k.toUpperCase()}:${v}</span>`).join('')}</span></div>`).join('');
  pv.innerHTML=`<div class="alert-box green"><div class="t">${kn}データを ${recs.length}件 検出しました</div>
    既存職員と一致：<b>${matched}件</b>／未登録の氏名：<b>${newp.size}名</b>${newp.size?'（'+[...newp].map(esc).join('、')+'）':''}${kind==='health'?'<br><span style="font-size:11px">※ 体調・気持ち・睡眠をそのまま取り込みます。同じ氏名・同じ日付は上書き。</span>':''}</div>
    <div class="log-list">${rowHTML}${recs.length>20?'<p class="hint">ほか '+(recs.length-20)+' 件…</p>':''}</div>`;
  $('imp_apply').style.display='';
}
function applyImport(){
  if(!parsedImport){toast('先に解析してください');return;}
  const addNew=$('imp_new').checked,{kind,recs}=parsedImport;let done=0,skip=0;
  recs.forEach(rec=>{
    let s=staff.find(x=>x.name===rec.name);
    if(!s){if(!addNew){skip++;return;}s=blank();s.name=rec.name;staff.push(s);}
    if(kind==='health'){
      const day=(rec.date||'').slice(0,10);
      const entry={ts:rec.date||new Date().toISOString().slice(0,10),cond:rec.cond||3,mood:rec.mood||3,sleep:rec.sleep||3,back:0,wrist:0,note:rec.note||'',src:'import'};

        <div class="ro"><div class="l">最新の体調</div><div class="v">${lt?lt.cond:'—'}<span style="font-size:11px;font-weight:400;color:var(--ink-soft)"> ／ 7日平均 ${avg('cond')}</span></div></div>
        <div class="ro"><div class="l">最新の気持ち</div><div class="v">${lt?lt.mood:'—'}<span style="font-size:11px;font-weight:400;color:var(--ink-soft)"> ／ 7日平均 ${avg('mood')}</span></div></div>
        <div class="ro"><div class="l">最新の睡眠</div><div class="v">${lt?lt.sleep:'—'}<span style="font-size:11px;font-weight:400;color:var(--ink-soft)"> ／ 7日平均 ${avg('sleep')}</span></div></div></div>
      <div class="seg" style="margin-bottom:12px">${ranges.map(([v,l])=>`<button type="button" class="range-btn ${v===healthRange?'on':''}" data-v="${v}">${l}</button>`).join('')}</div>
      ${multiLine(logs)}</div>
    <div class="panel"><h2>記録一覧</h2><div class="log-list">${logRows(s)}</div></div>
    <div class="panel"><h2>健康診断の記録</h2><p class="lead">健診結果は別アプリに無いため、こちらで随時追加できます（本人のみ閲覧）。</p>
      <div class="fields"><div class="field"><label>受診日</label><input id="c_date" type="date"></div><div class="field"><label>BMI</label><input id="c_bmi" placeholder="例 22.5"></div>
        <div class="field"><label>血圧</label><input id="c_bp" placeholder="例 128/82"></div><div class="field full"><label>所見・特記</label><textarea id="c_find" rows="2"></textarea></div></div>
      <button class="btn sm" style="margin-top:10px" id="c_submit">健診を追加</button><div class="log-list" style="margin-top:10px">${checkupRows(s)}</div></div>`;
}
function scaleBlock(k,label,lo,hi){return `<div class="check-scale"><label>${label}</label><div class="scale" data-k="${k}">${[1,2,3,4,5].map(v=>`<button type="button" data-v="${v}">${v}</button>`).join('')}</div><div class="ends"><span>${lo}</span><span>${hi}</span></div></div>`;}
function segBlock(k){const lab=['なし','軽い','中等度','強い'];return `<div class="seg" data-k="${k}">${lab.map((l,v)=>`<button type="button" data-v="${v}" class="${v===0?'on':''}">${l}</button>`).join('')}</div>`;}
function sparkline(arr){if(arr.length<2)return '<p class="hint">記録が2件以上たまると推移が表示されます。</p>';
  const w=300,h=54,max=5,min=1;const step=w/(arr.length-1);
  const pts=arr.map((v,i)=>`${(i*step).toFixed(1)},${(h-((v-min)/(max-min))*(h-8)-4).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="var(--staff)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${arr.map((v,i)=>`<circle cx="${(i*step).toFixed(1)}" cy="${(h-((v-min)/(max-min))*(h-8)-4).toFixed(1)}" r="3" fill="var(--staff)"/>`).join('')}</svg>`;}
function logRows(s){if(!s.healthLog.length)return '<p class="hint">まだ記録がありません。</p>';const lab=['なし','軽','中','強'];
  return s.healthLog.slice(0,12).map(l=>`<div class="log-row"><span class="d">${l.ts.slice(0,16).replace('T',' ')}</span><span class="v"><span>体調${l.cond}</span><span>気持ち${l.mood}</span><span>睡眠${l.sleep}</span><span>腰:${lab[l.back]}</span><span>手首:${lab[l.wrist]}</span>${l.note?`<span>📝${esc(l.note)}</span>`:''}</span></div>`).join('');}
function checkupRows(s){if(!s.checkups.length)return '';return s.checkups.slice().reverse().map(c=>`<div class="log-row"><span class="d">${c.date||'—'}</span><span class="v"><span>BMI ${esc(c.bmi||'—')}</span><span>血圧 ${esc(c.bp||'—')}</span>${c.findings?`<span>📝${esc(c.findings)}</span>`:''}</span></div>`).join('');}
function bindStaff(){
  document.querySelectorAll('.scale').forEach(sc=>{const k=sc.dataset.k;sc.querySelectorAll('button').forEach(b=>b.onclick=()=>{draft[k]=+b.dataset.v;sc.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});});
  document.querySelectorAll('.seg').forEach(sg=>{const k=sg.dataset.k;if(!k)return;sg.querySelectorAll('button').forEach(b=>b.onclick=()=>{draft[k]=+b.dataset.v;sg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});});
  document.querySelectorAll('.range-btn').forEach(b=>b.onclick=()=>{healthRange=+b.dataset.v;render();bindStaff();});
  const sub=$('h_submit');if(sub)sub.onclick=submitHealth;const cs=$('c_submit');if(cs)cs.onclick=submitCheckup;
}
function submitHealth(){if(!draft.cond||!draft.mood||!draft.sleep){toast('体調・気持ち・睡眠をタップしてください');return;}
  const s=staff.find(x=>x.id===currentStaffId);s.healthLog.unshift({ts:new Date().toISOString().slice(0,16),cond:draft.cond,mood:draft.mood,sleep:draft.sleep,back:draft.back||0,wrist:draft.wrist||0,note:($('h_note').value||'').trim()});
  draft={cond:0,mood:0,sleep:0,back:0,wrist:0};save();render();bindStaff();toast('記録しました。お疲れさまです');}
function submitCheckup(){const s=staff.find(x=>x.id===currentStaffId);const d=$('c_date').value,bmi=$('c_bmi').value,bp=$('c_bp').value,f=$('c_find').value;
  if(!d&&!bmi&&!bp&&!f){toast('入力がありません');return;}s.checkups.push({date:d,bmi,bp,findings:f});save();render();bindStaff();toast('健診を追加しました');}

/* ---- proposal ---- */
function proposalHTML(){return `<div class="proposal"><h3>キャリア項目・体調チェック・個別支援計画の設計</h3>
  <ul>
    <li><b>🧭 キャリア項目</b>：研修項目／キャリアアンカー(8分類の数値)／エゴグラム(CP・NP・A・FC・AC の5尺度)。アンカーとエゴグラムは<b>半年に1回</b>の測定として日付つきで蓄積し、前回との比較（エゴグラムは薄線で重ね表示）で変化を追えます。</li>
    <li><b>🩺 体調チェック</b>：別アプリと同一の<b>体調・気持ち・睡眠</b>の3項目（1〜5）＋腰・手首。CSV取込でも、その場の本人入力でも同じ枠に蓄積されます。</li>
    <li><b>⬆ CSV取込</b>：キャリアアンカー・エゴグラム・体調チェックの3種を、ヘッダーから自動判定して氏名で照合・取込。別アプリの診断結果をこのダッシュボードに集約できます。</li>
    <li><b>📝 個別支援計画</b>：現状→課題・ニーズ→短期/長期目標→具体的支援→担当・見直し、の構成。3軸のアラートとキャリアアンカー/エゴグラムから<b>検討材料(ヒント)を自動抽出</b>し、計画文は人が書きます。</li>
    <li><b>アクセス分離</b>：心身の生データは本人のみ。キャリア測定・勤務・計画は管理者（相談員）が編集。計画は本人と共有・合意して進める前提です。</li>
    <li><b>注意</b>：キャリアアンカー・エゴグラムは自己理解と育成の手がかりであり、人を固定的に判定するものではありません。表現は「傾向」にとどめています。</li>
  </ul>
  <p style="margin-top:10px;font-size:12px;color:var(--ink-soft)">⚠️ モード切替は設計デモです。実運用では端末分離・ログイン認証・保存先の暗号化・就業規則と本人同意の整備など、正式な情報セキュリティ対応が別途必要です。CSV貼り付けは「今すぐ反映」用の橋渡しで、最終的にはFirestore等の共通バックエンドで常時同期する形が理想です。</p></div>`;}

/* ---- seed ---- */

    mk({name:'職員B（見本）',role:'介護職員',
        career:{trainings:'初任者研修',assessments:[as(d0,[5,4,5,7,3,6,5,6],[6,12,14,13,9])]},
        healthLog:log([[2,3,2,1,0],[3,3,3,1,0],[3,4,3,0,0]]),work:{consecWork:5,consecOff:2,night:5,nightBase:4,overtime:36,paidLeaveMonths:1,absence:0},incident:{now:1,base:1}}),
    mk({name:'職員C（見本）',role:'ケアマネジャー',
        career:{trainings:'介護支援専門員研修、リーダー研修',assessments:[as(d0,[8,7,5,5,4,7,6,5],[10,14,16,11,7])]},
        healthLog:log([[4,4,4,0,0],[4,5,4,0,0],[5,4,4,0,0]]),work:{consecWork:4,consecOff:3,night:0,nightBase:0,overtime:12,paidLeaveMonths:0,absence:0},incident:{now:0,base:0}})
  ];
}
/* ---- init ---- */
document.querySelectorAll('#roleswitch button').forEach(b=>b.onclick=()=>setRole(b.dataset.r));
$('staffPicker').onchange=e=>{currentStaffId=e.target.value;draft={cond:0,mood:0,sleep:0,back:0,wrist:0};render();bindStaff();};
$('addBtn').onclick=addStaff;
$('importBtn').onclick=openImportModal;
$('syncBtn').onclick=async()=>{if(!adminCred){const ok=await openLoginModal();if(!ok)return;}const b=$('syncBtn');const t=b.textContent;b.textContent='同期中…';b.disabled=true;try{await syncFirestore();render();const L=syncFirestore._last||{h:0,a:0,e:0};toast(`同期完了：体調${L.h}・キャリア${L.a}・エゴ${L.e} 件`);}catch(e){toast('同期に失敗：'+e.message);}b.textContent=t;b.disabled=false;};
$('overlay').onclick=e=>{if(e.target===$('overlay'))closeModal();};
(async()=>{await load();setRole('mgr');const ok=await openLoginModal();if(ok){try{await syncFirestore();render();}catch(e){toast('読み込みに失敗：'+e.message);}}})();
</script>
