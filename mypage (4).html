<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マイページ ｜ おおやけの里</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f1ea;--panel:#fffdf8;--ink:#2b2a28;--ink-soft:#6b675f;--line:#e3ddd0;--brand:#0087BB;--accent:#46588A;--err:#c0533f}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.65}
  header{display:flex;align-items:center;gap:10px;max-width:560px;margin:0 auto;padding:18px 18px 0}
  header .brand-logo{height:32px;width:auto}
  header .hgroup{flex:1;text-align:center}
  header h1{font-family:"Noto Serif JP",serif;font-size:20px;font-weight:700}
  header .sub{font-size:11.5px;color:var(--ink-soft)}
  header .brand-mascot{height:40px;width:auto}
  main{max-width:560px;margin:0 auto;padding:16px 18px 8px}
  .card{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;border-top:4px solid var(--line)}
  .card.c-health{border-top-color:#5a6e9c}.card.c-ego{border-top-color:#4a8c6a}.card.c-car{border-top-color:#dd8341}
  .card h2{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .card h2 .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  label{display:block;font-size:12px;color:var(--ink-soft);margin:8px 0 4px}
  input{width:100%;font-family:inherit;font-size:16px;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff}
  input:focus{outline:none;border-color:var(--accent)}
  .btn{width:100%;font-family:inherit;font-size:15px;font-weight:700;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;margin-top:14px;cursor:pointer}
  .btn.sub{background:var(--bg);color:var(--accent);border:1.5px solid var(--line)}
  .toggle{display:block;text-align:center;font-size:12.5px;color:var(--accent);font-weight:600;margin-top:12px;cursor:pointer;text-decoration:underline}
  .msg{font-size:12.5px;margin-top:10px;line-height:1.7}
  .msg.err{color:var(--err);font-weight:600}
  .msg.ok{color:#2e7d4f;font-weight:600}
  .note{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.7}
  .empty{font-size:13px;color:var(--ink-soft);background:var(--bg);border-radius:10px;padding:12px 14px}
  .meta{font-size:11.5px;color:var(--ink-soft);margin-bottom:8px}
  .owner{background:var(--panel);border:1.5px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:14px;font-size:13.5px;display:flex;align-items:center;gap:10px}
  .owner b{font-size:16px}
  .owner .out{margin-left:auto;font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;text-decoration:underline;flex:0 0 auto}
  .trend{display:flex;align-items:flex-end;gap:4px;height:88px;padding:6px 2px 0}
  .trend .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
  .trend .bar{width:100%;max-width:22px;border-radius:4px 4px 0 0}
  .legend{display:flex;gap:12px;font-size:10.5px;color:var(--ink-soft);margin-top:6px;flex-wrap:wrap}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}
  .trend .d{font-size:8.5px;color:var(--ink-soft);white-space:nowrap}
  .latest{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .pill{background:var(--bg);border-radius:100px;padding:5px 12px;font-size:12.5px;border-left:5px solid transparent}
  .pill b{font-size:14px}
  .row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .row:last-of-type{border-bottom:none}
  .row .nm{width:118px;flex:0 0 auto;display:flex;align-items:center;gap:6px}
  .kchip{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:20px;border-radius:6px;color:#fff;font-size:10.5px;font-weight:700;flex:0 0 auto;padding:0 5px}
  .nmtx small{display:block;font-size:10px;color:var(--ink-soft)}
  .row .tr{flex:1;background:#e9e4d9;border-radius:5px;height:10px;overflow:hidden}
  .row .fl{height:10px;border-radius:5px;background:var(--accent);display:block}
  .row .vl{width:56px;text-align:right;font-weight:700;font-size:12.5px;flex:0 0 auto}
  .bigname{font-size:18px;font-weight:700;color:var(--accent);margin:2px 0 6px}
  .chgline{font-size:12px;color:var(--ink-soft);margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
  .privacy{font-size:11px;color:var(--ink-soft);text-align:center;margin:4px 0 8px;line-height:1.7}
  .brand-foot{max-width:560px;margin:6px auto 24px;padding:14px 18px 0;text-align:center;border-top:1px solid var(--line)}
  .brand-slogan{font-size:12px;letter-spacing:.18em;color:var(--brand);font-weight:600}
  .brand-org{font-size:10px;letter-spacing:.1em;color:#a8a49c;margin-top:3px}
  #view{display:none}
</style>
</head>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbxGdP-pqQRqM2Dg_eG0bIngtxS3OOqzdO6AbZSa7UBfEC8I-ljul5OCk2W0U12RNT3Vqg/exec';
const EGO_NAMES={"CP": "批判的な親", "NP": "養育的な親", "A": "大人", "FC": "自由な子ども", "AC": "順応した子ども"}, EGO_MAX=40, EGO_COLORS={"CP": "#e05c5c", "NP": "#3aad6e", "A": "#3a7fe0", "FC": "#e09b3a", "AC": "#9b5ce0"};
const H_GOOD='#4a8c6a', H_MID='#5a6e9c', H_LOW='#dd8341';
const ANCHORS=[["TF", "専門・職能別能力", "#e05c5c"], ["GM", "管理能力", "#3a7fe0"], ["AU", "自律・独立", "#3aad6e"], ["SE", "保障・安定", "#e09b3a"], ["EC", "起業家的創造性", "#9b5ce0"], ["SV", "奉仕・社会貢献", "#e0735c"], ["CH", "純粋な挑戦", "#5c9be0"], ["LS", "生活様式", "#5cb87e"]], CAR_MAX=30;
const $=id=>document.getElementById(id);
const esc=t=>String(t??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ls=k=>{try{return localStorage.getItem(k);}catch(e){return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}};

let regMode=false;

function init(){
  $('in-name').value=(ls('mp_name')||ls('hc_name')||'');
  $('toggle-reg').onclick=()=>{regMode=!regMode;
    $('reg-extra').style.display=regMode?'':'none';
    $('gate-title').textContent=regMode?'はじめての登録':'記録を見る';
    $('btn-main').textContent=regMode?'この暗証番号で登録する':'記録を見る';
    $('toggle-reg').textContent=regMode?'登録済みの方はこちら（記録を見る）':'はじめての方はこちら（暗証番号の登録）';
    setMsg('','');};
  $('btn-main').onclick=go;
  $('btn-out').onclick=()=>{$('view').style.display='none';$('gate').style.display='';$('in-pin').value='';};
  if(GAS_URL.indexOf('__')===0){setMsg('err','（管理者向け）仲介プログラムのURLが未設定のため、まだ利用できません。');$('btn-main').disabled=true;}
}

function setMsg(cls,t){const m=$('gate-msg');m.className='msg '+(cls||'');m.textContent=t;}

async function go(){
  const name=$('in-name').value.trim(), pin=$('in-pin').value.trim();
  if(!name){setMsg('err','氏名を入力してください。');return;}
  if(!/^\d{4,8}$/.test(pin)){setMsg('err','暗証番号は4〜8桁の数字にしてください。');return;}
  if(regMode){
    const pin2=$('in-pin2').value.trim();
    if(pin!==pin2){setMsg('err','確認用の暗証番号が一致しません。');return;}
  }
  const b=$('btn-main');b.disabled=true;const bt=b.textContent;b.textContent='通信中…';setMsg('','');
  try{
    const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:regMode?'register':'fetch',name:name,pin:pin})});
    const d=await res.json();
    if(!d.ok){setMsg('err',d.error||'失敗しました。');return;}
    lsSet('mp_name',name);
    if(regMode){
      setMsg('ok','登録できました。続けて「記録を見る」でこの暗証番号を入力してください。');
      $('toggle-reg').onclick&&$('toggle-reg').onclick();
      return;
    }
    showView(name,d);
  }catch(e){
    setMsg('err','通信に失敗しました。電波の良い場所でやり直してください。');
  }finally{b.disabled=false;b.textContent=bt;}
}

function showView(name,d){
  $('gate').style.display='none';$('view').style.display='';
  $('owner-name').innerHTML='<b>'+esc(name)+'</b>　さんの記録';
  renderHealth(d.health||[]);renderEgo(d.ego||[]);renderCar(d.career||[]);
  renderMendan(name);
}

function mendanTerm(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth()+1;
  const fy=m>=4?y:y-1;const half=(m>=4&&m<=9)?'上期':'下期';
  return fy+half;
}
async function mpAuthToken(){
  const RT_KEY='oyake_auth_rt';let rt=ls(RT_KEY);
  if(rt){try{
    const r=await fetch('https://securetoken.googleapis.com/v1/token?key='+FB_MP.apiKey,
      {method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(rt)});
    if(r.ok)return (await r.json()).id_token;
  }catch(e){}}
  const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key='+FB_MP.apiKey,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({returnSecureToken:true})});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();lsSet(RT_KEY,j.refreshToken);return j.idToken;
}
async function renderMendan(name){
  const el=$('mendan-body');if(!el)return;
  const term=mendanTerm();
  const btn='<a href="'+MENDAN_URL+'" style="display:inline-block;margin-top:8px;background:#8a6ea0;color:#fff;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;text-decoration:none">面談の事前入力ページへ</a>';
  try{
    const token=await mpAuthToken();
    const ids=[name+'_'+term,String(name).replace(/[\s\u3000]+/g,'')+'_'+term];
    let doc=null;
    for(const id of ids){
      const url='https://firestore.googleapis.com/v1/projects/'+FB_MP.projectId+'/databases/(default)/documents/mendanPrep/'+encodeURIComponent(id.replace(/[\/\\#?]/g,'-'))+'?key='+FB_MP.apiKey;
      const r=await fetch(url,{headers:{'Authorization':'Bearer '+token}});
      if(r.ok){doc=await r.json();break;}
    }
    if(doc){
      const dt=doc.fields&&doc.fields.date&&doc.fields.date.stringValue||'';
      el.innerHTML='<div style="font-size:13px">今期（'+esc(term)+'）の事前入力：<b style="color:#2f6e4f">提出済み</b>'+(dt?('（'+esc(dt)+'）'):'')+'</div>'
        +'<div style="font-size:11.5px;color:var(--ink-soft);margin-top:4px">面談前に修正したい場合は、もう一度入力して提出し直すと上書きされます。</div>'+btn;
    }else{
      el.innerHTML='<div style="font-size:13px">今期（'+esc(term)+'）の事前入力：<b style="color:#c0533f">未提出</b></div>'
        +'<div style="font-size:11.5px;color:var(--ink-soft);margin-top:4px">1on1面談の前に、エゴグラム・キャリアアンカー診断とあわせて入力してください（所要10〜15分）。</div>'+btn;
    }
  }catch(e){
    el.innerHTML='<div style="font-size:12px;color:var(--ink-soft)">提出状況を確認できませんでした。</div>'+btn;
  }
}

function renderHealth(H){
  const el=$('health-body');
  H=H.slice().sort((a,b)=>String(a.ts||a.date||'').localeCompare(String(b.ts||b.date||'')));
  if(!H.length){el.innerHTML='<div class="empty">まだ体調の記録がありません。</div>';return;}
  const recent=H.slice(-14);
  const barColor=a=>a>=4?H_GOOD:a>=3?H_MID:H_LOW;
  const bars=recent.map(r=>{
    const avg=(r.avg!=null)?r.avg:Math.round(((r.cond||0)+(r.mood||0)+(r.sleep||0))/3*10)/10;
    const h=Math.max(6,Math.round(avg/5*78));
    const dd=String(r.date||'').slice(5).replace('-','/');
    return '<div class="col"><div class="bar" style="height:'+h+'px;background:'+barColor(avg)+'" title="'+esc(r.date)+' 平均'+avg+'"></div><div class="d">'+esc(dd)+'</div></div>';
  }).join('');
  const L=H[H.length-1];
  el.innerHTML='<div class="meta">記録：'+H.length+'件（クラウド保存分）　直近'+recent.length+'回の平均点の推移（5点満点）</div>'
    +'<div class="trend">'+bars+'</div>'
    +'<div class="legend"><span><i style="background:'+H_GOOD+'"></i>良い（4以上）</span><span><i style="background:'+H_MID+'"></i>ふつう（3〜3.9）</span><span><i style="background:'+H_LOW+'"></i>低め（3未満）</span></div>'
    +'<div class="latest"><span class="pill" style="border-left-color:#8b867c">最新 '+esc(L.date||'')+'</span>'
    +'<span class="pill" style="border-left-color:'+barColor(L.cond||0)+'">体調 <b>'+(L.cond??'-')+'</b>/5</span>'
    +'<span class="pill" style="border-left-color:'+barColor(L.mood||0)+'">気持ち <b>'+(L.mood??'-')+'</b>/5</span>'
    +'<span class="pill" style="border-left-color:'+barColor(L.sleep||0)+'">睡眠 <b>'+(L.sleep??'-')+'</b>/5</span></div>';
}

function renderEgo(R){
  const el=$('ego-body');
  const KEYS=['CP','NP','A','FC','AC'];
  R=R.slice().filter(r=>r.cp!=null).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
  if(!R.length){el.innerHTML='<div class="empty">まだエゴグラムの記録がありません。</div>';return;}
  const cur=R[0],prev=R[1];
  const val=(r,k)=>Number(r[k.toLowerCase()]||0);
  const rows=KEYS.map(k=>{
    const v=val(cur,k),p=Math.round(v/EGO_MAX*100),c=EGO_COLORS[k]||'#46588A';
    return '<div class="row"><span class="nm"><span class="kchip" style="background:'+c+'">'+k+'</span><span class="nmtx"><small>'+esc(EGO_NAMES[k]||'')+'</small></span></span><span class="tr"><span class="fl" style="width:'+p+'%;background:'+c+'"></span></span><span class="vl">'+v+' / '+EGO_MAX+'</span></div>';
  }).join('');
  let chg='';
  if(prev){
    const parts=KEYS.map(k=>{const d=val(cur,k)-val(prev,k);return d?(k+' '+(d>0?'＋':'−')+Math.abs(d)):null;}).filter(Boolean);
    chg='<div class="chgline">前回（'+esc(prev.date||'')+'）との変化：'+(parts.length?parts.join('　'):'変化なし')+'</div>';
  }
  el.innerHTML='<div class="meta">最新の診断：'+esc(cur.date||'')+'　／　記録：'+R.length+'件</div>'
    +(cur.pattern?'<div class="bigname" style="color:#4a8c6a">'+esc(cur.pattern)+'</div>':'')
    +rows+chg
    +'<a class="toggle" style="text-align:left" href="egogram.html">→ もう一度診断する</a>';
}

function renderCar(R){
  const el=$('car-body');
  const ids=ANCHORS.map(a=>a[0]);
  R=R.slice().filter(r=>r.tf!=null).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
  if(!R.length){el.innerHTML='<div class="empty">まだキャリアアンカーの記録がありません。</div>';return;}
  const cur=R[0],prev=R[1];
  const val=(r,k)=>Number(r[k.toLowerCase()]||0);
  const nameOf=id=>{const f=ANCHORS.find(a=>a[0]===id);return f?f[1]:id;};
  const rank=[...ids].sort((a,b)=>val(cur,b)-val(cur,a));
  const colorOf=id=>{const f=ANCHORS.find(a=>a[0]===id);return (f&&f[2])||'#46588A';};
  const rows=rank.map((k,i)=>{
    const v=val(cur,k),p=Math.round(v/CAR_MAX*100),c=colorOf(k);
    return '<div class="row"><span class="nm"><span class="kchip" style="background:'+c+'">'+(i+1)+'位</span><span class="nmtx"><small>'+esc(nameOf(k))+'</small></span></span><span class="tr"><span class="fl" style="width:'+p+'%;background:'+c+'"></span></span><span class="vl">'+v+' / '+CAR_MAX+'</span></div>';
  }).join('');
  let chg='';
  if(prev){
    const prevTop=[...ids].sort((a,b)=>val(prev,b)-val(prev,a))[0];
    chg='<div class="chgline">前回（'+esc(prev.date||'')+'）の主要アンカー：'+esc(nameOf(prevTop))+(prevTop===rank[0]?'（変わらず）':' → 今回：'+esc(nameOf(rank[0])))+'</div>';
  }
  el.innerHTML='<div class="meta">最新の診断：'+esc(cur.date||'')+'　／　記録：'+R.length+'件</div>'
    +'<div style="font-size:11px;color:var(--ink-soft)">あなたの主要アンカー（仕事で最も大切にする価値観）</div>'
    +'<div class="bigname" style="color:'+colorOf(rank[0])+'">'+esc(nameOf(rank[0]))+'</div>'+rows+chg
    +'<a class="toggle" style="text-align:left" href="career.html">→ もう一度診断する</a>';
}

init();
</script>
